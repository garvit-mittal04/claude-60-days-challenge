<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Marketing Detective — Day 34 · #60DayClaudeChallenge</title>
<style>
/* =============================================================
   MARKETING DETECTIVE — Day 34
   Single HTML file. Vanilla CSS + JavaScript. No frameworks.
   Detective-style aesthetic — corkboard, sticky notes, push pins.
   ============================================================= */

:root {
  --bg:        #0e0a06;
  --bg-2:      #150e08;
  --cork:      #2a1c10;
  --cork-2:    #3a2716;
  --panel:     #1a130c;
  --panel-2:   #241a10;
  --line:      #3a2a1a;
  --line-2:    #4a3623;
  --text:      #f5ecdd;
  --text-dim:  #c9b89b;
  --text-mute: #8f7d62;

  --paper:     #f6ead1;
  --paper-shadow: rgba(0,0,0,.45);

  --accent:    #e46c2b;
  --accent-2:  #f2a24a;
  --accent-soft: rgba(228,108,43,.18);

  --good:      #63d095;
  --warn:      #f6b83a;
  --bad:       #e5556f;
  --gold:      #ffd166;
  --thread:    #c22626;

  --shadow:    0 22px 60px rgba(0,0,0,.55);
  --radius:    12px;
}

/* Color theme presets */
[data-theme="orange"] { --accent:#e46c2b; --accent-2:#f2a24a; --accent-soft:rgba(228,108,43,.18); --bg:#0e0a06; --bg-2:#150e08; --cork:#2a1c10; --cork-2:#3a2716; --panel:#1a130c; --line:#3a2a1a; }
[data-theme="noir"]   { --accent:#7fb3ff; --accent-2:#a9cbff; --accent-soft:rgba(127,179,255,.18); --bg:#080a10; --bg-2:#0d1119; --cork:#151a26; --cork-2:#1e2434; --panel:#111725; --line:#2a3247; --thread:#e5556f; }
[data-theme="forest"] { --accent:#63d095; --accent-2:#98e5b8; --accent-soft:rgba(99,208,149,.18); --bg:#08120c; --bg-2:#0c1a12; --cork:#12261a; --cork-2:#193321; --panel:#0e1e14; --line:#1e3a29; --thread:#e5556f; }
[data-theme="ruby"]   { --accent:#ea5f8b; --accent-2:#ff97ba; --accent-soft:rgba(234,95,139,.18); --bg:#100a0d; --bg-2:#170f12; --cork:#2b1720; --cork-2:#3a1e2a; --panel:#221619; --line:#3a2027; --thread:#ffd166; }
[data-theme="claude"] { --accent:#e46c2b; --accent-2:#f2a24a; --accent-soft:rgba(228,108,43,.20); --bg:#0e0a06; --bg-2:#150e08; --cork:#2f1c0e; --cork-2:#402612; --panel:#1c130a; --line:#402a17; --thread:#c22626; }

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(1200px 800px at 10% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(900px 600px at 110% 110%, rgba(255,255,255,.03), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:"Special Elite", "Courier New", Courier, monospace;
  -webkit-font-smoothing:antialiased;
}
h1, h2, h3, h4, .serif {
  font-family:"IM Fell English", "Georgia", "Times New Roman", serif;
  letter-spacing:-.3px;
}
button, .ui, .lbl {
  font-family:"Courier New", Courier, "Special Elite", monospace;
}

.app { max-width:1180px; margin:0 auto; padding:22px 20px 60px; }

/* ========== HEADER ========== */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:14px 0 12px; margin-bottom:16px; flex-wrap:wrap; gap:12px;
  border-bottom:2px dashed var(--line);
}
.brand { display:flex; align-items:center; gap:14px; }
.logo {
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(135deg, var(--accent), var(--accent-2));
  display:flex; align-items:center; justify-content:center; font-size:26px;
  box-shadow:0 12px 30px rgba(0,0,0,.5);
  border:2px solid var(--line-2);
}
.brand h1 { margin:0; font-size:24px; letter-spacing:1px; font-weight:700; }
.brand .sub { font-size:10px; color:var(--text-mute); letter-spacing:3px; text-transform:uppercase; font-weight:700; font-family:"Courier New", monospace; }

.themePicker { display:flex; gap:6px; align-items:center; }
.themePicker .lbl { font-size:9px; letter-spacing:2px; color:var(--text-mute); text-transform:uppercase; font-weight:700; margin-right:4px; }
.swatch {
  width:26px; height:26px; border-radius:8px; cursor:pointer;
  border:2px solid transparent; transition:transform .12s, border-color .15s;
}
.swatch:hover { transform:scale(1.08); }
.swatch.active { border-color: var(--text); }
.swatch.claude { background:linear-gradient(135deg,#e46c2b,#f2a24a); }
.swatch.noir   { background:linear-gradient(135deg,#7fb3ff,#a9cbff); }
.swatch.forest { background:linear-gradient(135deg,#63d095,#98e5b8); }
.swatch.ruby   { background:linear-gradient(135deg,#ea5f8b,#ff97ba); }
.swatch.orange { background:linear-gradient(135deg,#e46c2b,#c25519); }

/* Stepper (case progress) */
.steps { display:flex; gap:6px; margin-bottom:18px; }
.step { flex:1; height:4px; background:rgba(255,255,255,.05); border-radius:2px; }
.step.done    { background: linear-gradient(90deg, var(--accent), var(--accent-2)); }
.step.current { background: linear-gradient(90deg, var(--accent), var(--accent-2)); box-shadow:0 0 12px var(--accent); }

/* ========== BUTTONS ========== */
.btn {
  appearance:none; border:1px solid var(--line);
  background:transparent; color:var(--text); font-weight:700;
  padding:12px 22px; border-radius:10px; cursor:pointer;
  font-size:13px; letter-spacing:1.5px; text-transform:uppercase;
  transition:transform .08s, border-color .12s, background .15s, box-shadow .15s;
  font-family:"Courier New", monospace;
}
.btn:hover  { border-color:var(--accent); background:var(--accent-soft); }
.btn:active { transform:translateY(1px); }
.btn.primary {
  background:linear-gradient(180deg, var(--accent), var(--accent-2));
  color:#1a0e00; border:none; font-weight:800;
  box-shadow:0 10px 26px rgba(228,108,43,.35);
}
.btn.primary:hover { transform: translateY(-1px); }
.btn:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }

/* ========== CARDS ========== */
.card {
  background:linear-gradient(180deg, var(--panel), var(--bg-2));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:24px; box-shadow:var(--shadow); margin-bottom:16px;
  animation: fadeIn .35s ease both;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(8px);} to { opacity:1; transform:translateY(0);} }

.card h2 { margin:0 0 8px; font-size:28px; letter-spacing:-.4px; font-weight:700; }
.card .lead { color:var(--text-dim); font-size:15px; line-height:1.65; margin-top:6px; font-family:"Courier New", monospace; }

/* ========== WELCOME ========== */
.welcome { text-align:center; padding:32px 20px; }
.welcome .title-big {
  font-family:"IM Fell English", Georgia, serif;
  font-size:52px; font-weight:800; letter-spacing:-1px;
  background: linear-gradient(90deg, #fff, var(--accent-2) 60%, var(--accent));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.welcome .tag { color:var(--text-dim); font-size:15px; margin-top:8px; max-width:560px; margin-left:auto; margin-right:auto; line-height:1.65; }
.welcome .stamp {
  display:inline-block; padding:8px 20px; margin-top:14px;
  border:2px solid var(--accent); color:var(--accent);
  font-family:"Courier New", monospace; font-size:11px; letter-spacing:3px; text-transform:uppercase; font-weight:800;
  transform: rotate(-3deg); background:var(--accent-soft);
}

/* ========== CASE ASSIGNMENT (folder look) ========== */
.folder {
  background:#c9b48a;
  border:1px solid #8a7550; border-radius:6px;
  padding:26px 30px;
  position:relative;
  color:#1c1206;
  box-shadow: 0 16px 40px rgba(0,0,0,.55), inset 0 -6px 12px rgba(0,0,0,.15);
  margin-top:10px;
}
.folder::before {
  content:""; position:absolute; top:-14px; left:24px;
  width:140px; height:20px;
  background:#c9b48a; border-top-left-radius:8px; border-top-right-radius:8px;
  border:1px solid #8a7550; border-bottom:none;
}
.folder .stamp-red {
  position:absolute; top:14px; right:16px;
  border:3px solid #c22626; color:#c22626;
  padding:4px 12px; font-size:11px; font-weight:900; letter-spacing:3px;
  transform: rotate(-8deg); font-family:"Courier New", monospace;
  background:rgba(255,255,255,.6);
}
.folder .caseNo {
  font-family:"Courier New", monospace; font-size:11px; letter-spacing:3px; color:#5a4022; font-weight:800;
}
.folder h3 {
  font-family:"IM Fell English", Georgia, serif;
  font-size:32px; margin:6px 0 4px; color:#1c1206; letter-spacing:-.3px;
}
.folder .industry { font-family:"Courier New", monospace; font-size:11px; letter-spacing:2px; color:#5a4022; }

.folderMeta { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:16px; }
@media(max-width:640px){ .folderMeta { grid-template-columns:1fr; } }
.folderMeta .row { border-bottom:1px dashed #8a7550; padding:6px 0; font-size:13px; }
.folderMeta .row .k { font-family:"Courier New", monospace; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#7a5c30; font-weight:800; margin-right:8px; }
.folderMeta .row .v { color:#241505; }

/* ========== CORKBOARD ========== */
.corkboard {
  background:
    radial-gradient(400px 200px at 50% 50%, rgba(0,0,0,.15), transparent 70%),
    linear-gradient(180deg, var(--cork-2), var(--cork));
  border:6px solid var(--line-2); border-radius:16px;
  padding:22px; box-shadow: inset 0 0 40px rgba(0,0,0,.5), var(--shadow);
  margin:8px 0 14px;
}

.evidenceGrid {
  display:grid; grid-template-columns:repeat(3, 1fr); gap:18px;
}
@media(max-width:820px){ .evidenceGrid { grid-template-columns:repeat(2, 1fr); } }
@media(max-width:520px){ .evidenceGrid { grid-template-columns:1fr; } }

/* Sticky note base */
.sticky {
  position:relative;
  background:#fbe57a; color:#2a1b06;
  border-radius:2px;
  padding:16px 18px 18px;
  box-shadow:
    0 12px 24px rgba(0,0,0,.5),
    inset 0 -14px 20px rgba(0,0,0,.08);
  transform: rotate(-1.2deg);
  transition: transform .15s, box-shadow .15s;
  cursor: grab;
}
.sticky:hover { transform: rotate(-.4deg) scale(1.02); box-shadow: 0 18px 28px rgba(0,0,0,.55); }
.sticky:active { cursor: grabbing; }
.sticky.pin::before {
  content:""; position:absolute; top:-8px; left:50%; transform:translateX(-50%);
  width:16px; height:16px; border-radius:50%;
  background: radial-gradient(circle at 30% 30%, #ff6b6b, #a01a1a 70%);
  box-shadow:0 4px 6px rgba(0,0,0,.5), inset 0 -2px 3px rgba(0,0,0,.3);
}

.sticky.note-1 { background:#fbe57a; transform: rotate(-1.5deg); }
.sticky.note-2 { background:#a3e0b6; transform: rotate(1.2deg); }
.sticky.note-3 { background:#fcbca8; transform: rotate(-.8deg); }
.sticky.note-4 { background:#c9d7ff; transform: rotate(1.5deg); }
.sticky.note-5 { background:#f4c2e1; transform: rotate(-1.1deg); }
.sticky.note-6 { background:#ffd6a0; transform: rotate(.9deg); }
.sticky.note-7 { background:#e1e1e1; transform: rotate(-.6deg); }
.sticky.note-8 { background:#c4f2f7; transform: rotate(1.3deg); }

.sticky .cat {
  font-family:"Courier New", monospace; font-size:9px;
  letter-spacing:2px; text-transform:uppercase; color:#5a3e0a; font-weight:800;
  margin-bottom:6px;
}
.sticky h4 {
  font-family:"IM Fell English", Georgia, serif;
  font-size:16px; margin:0 0 6px; color:#2a1b06; letter-spacing:-.2px;
}
.sticky .content {
  font-family:"Special Elite", "Courier New", monospace;
  font-size:12.5px; line-height:1.5; color:#2a1b06;
}
.sticky .content b { font-weight:800; }
.sticky .metrics { display:grid; grid-template-columns:1fr 1fr; gap:4px 12px; margin-top:6px; font-size:12px; }
.sticky .metrics span { font-family:"Courier New", monospace; }
.sticky .metrics b { color:#5a3e0a; }

/* Draggable state */
.sticky.dragging { opacity:.5; z-index:20; }
.dropzone {
  border:2px dashed var(--line-2); border-radius:10px;
  min-height:90px; padding:10px;
  color:var(--text-mute); font-size:12px; letter-spacing:1.5px; text-transform:uppercase;
  display:flex; align-items:center; justify-content:center;
  transition: border-color .15s, background .15s;
}
.dropzone.hover { border-color:var(--accent); background:var(--accent-soft); }

/* Investigation notes text */
.notes {
  background: rgba(0,0,0,.35); border-radius:10px; padding:12px 14px; margin-top:10px;
  font-family:"Courier New", monospace; font-size:12px; color:var(--text-dim); line-height:1.6;
  border-left: 3px solid var(--accent);
}

/* ========== SOLVE ========== */
.solveGrid {
  display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:14px;
}
@media(max-width:720px){ .solveGrid { grid-template-columns:1fr; } }
.solveChoice {
  background:var(--panel-2); border:1.5px solid var(--line); border-radius:12px;
  padding:14px 16px; cursor:pointer; text-align:left;
  transition:border-color .12s, transform .08s, background .15s;
  font-family:"Courier New", monospace; color:var(--text); font-size:13.5px; font-weight:700;
}
.solveChoice:hover { border-color:var(--accent); background:var(--accent-soft); }
.solveChoice.selected { border-color:var(--accent); background:var(--accent-soft); }
.solveChoice.correct { border-color:var(--good); background:rgba(99,208,149,.12); }
.solveChoice.wrong   { border-color:var(--bad);  background:rgba(229,85,111,.12); }
.solveChoice .cat {
  display:block; font-size:9px; letter-spacing:2px; color:var(--accent); font-weight:800; text-transform:uppercase; margin-bottom:4px;
}
.solveChoice .desc {
  display:block; font-family:"Special Elite","Courier New",monospace; color:var(--text-dim); font-size:12px; margin-top:4px; font-weight:400; line-height:1.5;
}

/* ========== CASE CLOSED ========== */
.solved {
  text-align:center; padding:26px 20px;
  animation: pop .35s ease both;
  position:relative;
}
@keyframes pop { from { transform:scale(.9); opacity:0; } to { transform:scale(1); opacity:1; } }

.solved .verdict {
  font-family:"IM Fell English", Georgia, serif;
  font-size:80px; font-weight:900; letter-spacing:-2px;
  background:linear-gradient(135deg, var(--good), var(--accent-2));
  -webkit-background-clip:text; background-clip:text; color:transparent;
  line-height:1;
}
.solved .verdict.wrongCase {
  background:linear-gradient(135deg, var(--bad), var(--warn));
  -webkit-background-clip:text; background-clip:text;
}
.solved .stampLarge {
  display:inline-block; padding:14px 42px; margin-top:16px;
  border:5px solid var(--good); color:var(--good);
  font-family:"Courier New", monospace; font-size:26px; letter-spacing:6px; text-transform:uppercase; font-weight:900;
  transform: rotate(-5deg); background:rgba(99,208,149,.08);
}
.solved .stampLarge.wrongCase { border-color:var(--warn); color:var(--warn); background:rgba(246,184,58,.08); }

/* ========== LEARNING REPORT ========== */
.reportGrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-top:14px; }
@media(max-width:640px){ .reportGrid { grid-template-columns:1fr; } }
.reportTile {
  background: linear-gradient(180deg, var(--panel-2), var(--bg-2));
  border:1px solid var(--line); border-radius:12px; padding:16px 18px;
}
.reportTile h4 { margin:0 0 6px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:var(--accent); font-weight:800; font-family:"Courier New", monospace; }
.reportTile .body { color:var(--text-dim); font-size:13.5px; line-height:1.65; font-family:"Special Elite","Courier New",monospace; }
.reportTile ul { margin:6px 0 0; padding-left:18px; }
.reportTile ul li::marker { color:var(--accent); }
.reportTile.full { grid-column:1 / -1; }

.metricBars { display:grid; gap:8px; }
.metricRow {
  display:grid; grid-template-columns:130px 1fr 60px; gap:10px; align-items:center;
  font-family:"Courier New", monospace; font-size:12px; color:var(--text);
}
.metricRow .lbl { color:var(--text-mute); letter-spacing:1.5px; text-transform:uppercase; font-weight:700; }
.metricRow .bar { height:8px; background:rgba(255,255,255,.06); border-radius:4px; overflow:hidden; }
.metricRow .bar i { display:block; height:100%; background:linear-gradient(90deg, var(--accent), var(--accent-2)); transition: width 1s cubic-bezier(.2,.8,.2,1); }
.metricRow .v { text-align:right; color:var(--text); font-variant-numeric:tabular-nums; }

.actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; margin-top:16px; }
.footer { color:var(--text-mute); font-size:11px; text-align:center; margin-top:16px; font-family:"Courier New", monospace; letter-spacing:1px; }

/* ========== HELPERS ========== */
.hidden { display:none !important; }
.tag {
  display:inline-block; font-size:10px; padding:3px 10px; border-radius:999px;
  background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent);
  font-weight:800; letter-spacing:1.5px; font-family:"Courier New", monospace;
}

/* Confetti (case-closed animation) */
.confetti { position:fixed; pointer-events:none; inset:0; overflow:hidden; z-index:60; display:none; }
.confetti.show { display:block; }
.confetti i { position:absolute; top:-10px; width:8px; height:14px; opacity:.9; animation:fall linear forwards; }
@keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:.6; } }
</style>
</head>
<body data-theme="claude">

<div class="app">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="brand">
      <div class="logo">🔍</div>
      <div>
        <h1>Marketing Detective</h1>
        <div class="sub">Day 34 · #60DayClaudeChallenge</div>
      </div>
    </div>
    <div class="themePicker">
      <span class="lbl">Theme</span>
      <div class="swatch claude active" data-swatch="claude" title="Claude Orange"></div>
      <div class="swatch noir" data-swatch="noir" title="Noir"></div>
      <div class="swatch forest" data-swatch="forest" title="Forest Case"></div>
      <div class="swatch ruby" data-swatch="ruby" title="Ruby"></div>
      <div class="swatch orange" data-swatch="orange" title="Warm Sepia"></div>
    </div>
  </header>

  <!-- ============ STEPPER ============ -->
  <div class="steps" id="stepper"></div>

  <!-- ============ STAGE ============ -->
  <div id="stage"></div>

  <p class="footer">
    Single HTML file · Vanilla CSS + JavaScript · No frameworks · No backend · Built for Day 34 of #60DayClaudeChallenge<br/>
    All companies, campaigns, and figures are fictional teaching examples.
  </p>
</div>

<div class="confetti" id="confetti"></div>

<script>
/* =============================================================
   MARKETING DETECTIVE — Day 34 · Logic
   ============================================================= */

/* ---------- Theme picker ---------- */
document.querySelectorAll(".swatch").forEach(s => {
  s.addEventListener("click", () => {
    document.body.setAttribute("data-theme", s.dataset.swatch);
    document.querySelectorAll(".swatch").forEach(x => x.classList.remove("active"));
    s.classList.add("active");
  });
});

/* ---------- CASE LIBRARY (fictional teaching examples) ---------- */
const CASES = [
  {
    id:"c1",
    company:"Lumen Brew Coffee",
    industry:"D2C · Specialty coffee subscription",
    objective:"Grow monthly subscribers by 40% in Q3",
    audience:"Home coffee enthusiasts, 28–45, urban US",
    channels:["Instagram Reels","TikTok","Google Search Ads","Podcast sponsorships"],
    budget:{ paid:65, content:15, influencer:15, email:5 },
    metrics:{ reach:"2.4M", ctr:"1.1%", engagement:"3.8%", conversions:"1,200", sales:"$54K" },
    customerComments:[
      "Great coffee but I had no idea what the subscription actually included until I got the box",
      "Ads promised 'artisan roasters' but I got the same generic blend twice in a row",
      "Cancelled after month 2 — didn't feel like the box matched what I signed up for"
    ],
    socialPerformance:"Instagram reach great, engagement collapsing week over week. Sentiment shifting negative in comments.",
    primaryMistake:"Acquisition promises didn't match the product experience",
    correctChoice:"acquisition-mismatch",
    choices:[
      { id:"acquisition-mismatch", cat:"POSITIONING", label:"Acquisition promises didn't match product experience",
        desc:"Ads sold 'artisan roasters' but the actual box was generic. Customers churned in month 2 because the reality didn't match the pitch." },
      { id:"wrong-channel", cat:"CHANNEL", label:"Wrong marketing channels for the audience",
        desc:"TikTok and Reels are actually reasonable for 28–45 urban coffee enthusiasts — reach was strong. Channel isn't the primary problem here." },
      { id:"low-budget", cat:"BUDGET", label:"Marketing budget was too small to compete",
        desc:"$54K in sales on strong reach suggests budget wasn't the blocker. The blocker was retention, which no budget increase fixes." },
      { id:"ignoring-email", cat:"CHANNEL", label:"Ignored email as a retention channel",
        desc:"Email underinvestment is a real issue, but retention starts at the promise, not the send cadence." },
    ],
    clues:[
      { cat:"CUSTOMER VOICE",  title:"Comment #1", text:"'Great coffee but I had no idea what the subscription actually included until I got the box.'" },
      { cat:"CHURN SIGNAL",    title:"Comment #3", text:"'Cancelled after month 2 — didn't feel like the box matched what I signed up for.'" },
      { cat:"SOCIAL PATTERN",  title:"Sentiment drop", text:"IG engagement fell week over week even while reach stayed strong. Classic acquisition-vs-retention mismatch." },
    ],
    explanation:"Reach and CTR were healthy. The real problem was that acquisition promises (artisan roasters, curated boxes) didn't match what customers actually received. That's not a channel problem or a budget problem — it's a positioning problem. Every dollar spent on ads was landing customers who then churned immediately, dragging LTV below CAC.",
    improvements:[

  {

/* ---------- State ---------- */
const state = {
  stage:"welcome",
  caseData:null,
  selectedChoice:null,
  revealed:false
};
const STAGES = ["welcome","assign","investigate","solve","closed","report"];

function idxOfStage() { return STAGES.indexOf(state.stage); }

/* ---------- Helpers ---------- */
function rand(arr) { return arr[Math.floor(Math.random()*arr.length)]; }
function escapeHtml(s) {
  return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ---------- Stepper ---------- */
function renderStepper() {
  const el = document.getElementById("stepper");
  el.innerHTML = STAGES.map((_, i) => {
    let cls = "step";
    if (i < idxOfStage()) cls += " done";
    else if (i === idxOfStage()) cls += " current";
    return `<div class="${cls}"></div>`;
  }).join("");
}

/* ---------- STAGES ---------- */
function renderWelcome() {
  document.getElementById("stage").innerHTML = `
    <div class="card welcome">
      <div class="stamp">CASE FILES · UNSOLVED</div>
      <div class="title-big" style="margin-top:14px;">Marketing Detective</div>
      <div class="tag">
        Fifteen fictional marketing cases. Each one has a mistake buried in the evidence. Your job is to
        read the case file, examine the corkboard, connect the clues, and identify the primary mistake before
        anyone else does. Every case is randomized. No two playthroughs are the same.
      </div>
      <button class="btn primary" style="margin-top:22px; padding:14px 28px;" id="startBtn">Accept Your First Case →</button>
    </div>
  `;
  document.getElementById("startBtn").addEventListener("click", () => {
    state.caseData = rand(CASES);
    state.selectedChoice = null;
    state.revealed = false;
    goto("assign");
  });
}

function renderAssign() {
  const c = state.caseData;
  const budgetHtml = Object.entries(c.budget).map(([k,v]) => `<span class="tag" style="margin-right:6px; margin-bottom:6px;">${k}: ${v}%</span>`).join("");

  document.getElementById("stage").innerHTML = `
    <div class="card">
      <h2>Case Assignment</h2>
      <p class="lead">A folder just landed on your desk. Read it. Then get to the board.</p>

      <div class="folder">
        <div class="stamp-red">UNSOLVED</div>
        <div class="caseNo">CASE FILE · ${escapeHtml(c.id.toUpperCase())}</div>
        <h3>${escapeHtml(c.company)}</h3>
        <div class="industry">${escapeHtml(c.industry)}</div>

        <div class="folderMeta">
          <div class="row"><span class="k">OBJECTIVE</span><span class="v">${escapeHtml(c.objective)}</span></div>
          <div class="row"><span class="k">AUDIENCE</span><span class="v">${escapeHtml(c.audience)}</span></div>
          <div class="row"><span class="k">CHANNELS</span><span class="v">${escapeHtml(c.channels.join(" · "))}</span></div>
          <div class="row"><span class="k">BUDGET MIX</span><span class="v">${budgetHtml}</span></div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="toBoard">Take Case to the Board →</button>
      </div>
    </div>
  `;
  document.getElementById("toBoard").addEventListener("click", () => goto("investigate"));
}

function renderInvestigate() {
  const c = state.caseData;
  const m = c.metrics;

  const stickies = [
    { cls:"note-1 pin", cat:"METRICS", title:"Campaign Performance",
      content:`
        <div class="metrics">
          <span><b>Reach:</b> ${escapeHtml(m.reach||"—")}</span>
          <span><b>CTR:</b> ${escapeHtml(m.ctr||"—")}</span>
          <span><b>Engagement:</b> ${escapeHtml(m.engagement||"—")}</span>
          <span><b>Conversions:</b> ${escapeHtml(m.conversions||"—")}</span>
        </div>
        <div style="margin-top:8px;"><b>Sales / Outcome:</b> ${escapeHtml(m.sales||m.churn||"—")}</div>
      ` },
    { cls:"note-2 pin", cat:"SOCIAL", title:"Social Media Performance",
      content: escapeHtml(c.socialPerformance||"") },
    { cls:"note-3 pin", cat:"CLUE 1", title:c.clues[0].title,
      content:`<b>${escapeHtml(c.clues[0].cat)}</b><br/>${escapeHtml(c.clues[0].text)}` },
    { cls:"note-4 pin", cat:"CLUE 2", title:c.clues[1].title,
      content:`<b>${escapeHtml(c.clues[1].cat)}</b><br/>${escapeHtml(c.clues[1].text)}` },
    { cls:"note-5 pin", cat:"CLUE 3", title:c.clues[2].title,
      content:`<b>${escapeHtml(c.clues[2].cat)}</b><br/>${escapeHtml(c.clues[2].text)}` },
    { cls:"note-6 pin", cat:"CUSTOMER VOICE", title:"Comment #1",
      content:`"${escapeHtml(c.customerComments[0])}"` },
    { cls:"note-7 pin", cat:"CUSTOMER VOICE", title:"Comment #2",
      content:`"${escapeHtml(c.customerComments[1])}"` },
    { cls:"note-8 pin", cat:"CUSTOMER VOICE", title:"Comment #3",
      content:`"${escapeHtml(c.customerComments[2])}"` },
  ];

  const stickyHtml = stickies.map((s, i) => `
    <div class="sticky ${s.cls}" draggable="true" data-idx="${i}">
      <div class="cat">${s.cat}</div>
      <h4>${escapeHtml(s.title)}</h4>
      <div class="content">${s.content}</div>
    </div>
  `).join("");

  document.getElementById("stage").innerHTML = `
    <div class="card">
      <h2>Investigation Board</h2>
      <p class="lead">Everything you need to solve the case is pinned to this board. Read the clues. You can drag notes around to arrange them the way an analyst would.</p>

      <div class="corkboard">
        <div class="evidenceGrid" id="evidenceGrid">
          ${stickyHtml}
        </div>
      </div>

      <div class="notes">
        <b>Detective's note.</b> Look for the one clue that connects to two others. The primary mistake is the one that explains the customer comments <b>and</b> the metrics <b>and</b> the social performance — not just one of them.
      </div>

      <div class="actions">
        <button class="btn primary" id="toSolve">I'm ready to solve →</button>
      </div>
    </div>
  `;

  // Draggable evidence (basic HTML5 drag-and-drop for the sticky notes within their grid)
  const stickyEls = document.querySelectorAll(".sticky");
  stickyEls.forEach(el => {
    el.addEventListener("dragstart", e => {
      el.classList.add("dragging");
      e.dataTransfer.setData("text/plain", el.dataset.idx);
      e.dataTransfer.effectAllowed = "move";
    });
    el.addEventListener("dragend", () => el.classList.remove("dragging"));
    el.addEventListener("dragover", e => e.preventDefault());
    el.addEventListener("drop", e => {
      e.preventDefault();
      const draggingEl = document.querySelector(".sticky.dragging");
      if (!draggingEl || draggingEl === el) return;
      const grid = document.getElementById("evidenceGrid");
      const rect = el.getBoundingClientRect();
      const before = (e.clientY < rect.top + rect.height/2);
      grid.insertBefore(draggingEl, before ? el : el.nextSibling);
    });
  });

  document.getElementById("toSolve").addEventListener("click", () => goto("solve"));
}

function renderSolve() {
  const c = state.caseData;
  const choicesHtml = c.choices.map(ch => `
    <button class="solveChoice" data-choice="${ch.id}">
      <span class="cat">${escapeHtml(ch.cat)}</span>
      ${escapeHtml(ch.label)}
      <span class="desc">${escapeHtml(ch.desc)}</span>
    </button>
  `).join("");

  document.getElementById("stage").innerHTML = `
    <div class="card">
      <h2>Solve the Case</h2>
      <p class="lead">Based on the evidence, what is the primary marketing mistake? Choose one.</p>

      <div class="solveGrid" id="solveGrid">
        ${choicesHtml}
      </div>

      <div class="actions">
        <button class="btn primary" id="submitSolve" disabled>Submit Verdict →</button>
      </div>
    </div>
  `;

  document.querySelectorAll(".solveChoice").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".solveChoice").forEach(x => x.classList.remove("selected"));
      btn.classList.add("selected");
      state.selectedChoice = btn.dataset.choice;
      document.getElementById("submitSolve").disabled = false;
    });
  });

  document.getElementById("submitSolve").addEventListener("click", () => {
    const correct = state.selectedChoice === c.correctChoice;
    document.querySelectorAll(".solveChoice").forEach(x => {
      if (x.dataset.choice === c.correctChoice) x.classList.add("correct");
      else if (x.dataset.choice === state.selectedChoice) x.classList.add("wrong");
    });
    setTimeout(() => goto("closed"), 900);
  });
}

function renderClosed() {
  const c = state.caseData;
  const correct = state.selectedChoice === c.correctChoice;
  const verdict = correct ? "CASE CLOSED" : "SOLVED (WITH A NOTE)";
  const verdictClass = correct ? "" : "wrongCase";
  const stampClass = correct ? "" : "wrongCase";

  document.getElementById("stage").innerHTML = `
    <div class="card solved">
      <div class="verdict ${verdictClass}">${verdict}</div>
      <div class="stampLarge ${stampClass}">${correct ? "✓ CORRECT" : "△ CLOSE, NOT QUITE"}</div>
      <p class="lead" style="margin-top:20px; max-width:640px; margin-left:auto; margin-right:auto;">
        ${correct
          ? "You identified the primary marketing mistake. Every detective sees the pattern differently — you saw this one clean."
          : `The primary mistake was actually <b>"${escapeHtml(c.choices.find(x => x.id === c.correctChoice).label)}"</b>. Your pick was close but wasn't the root cause. Read the report below.`
        }
      </p>
      <div class="actions" style="justify-content:center;">
        <button class="btn primary" id="toReport">Read the Learning Report →</button>
      </div>
    </div>
  `;
  if (correct) burstConfetti();
  document.getElementById("toReport").addEventListener("click", () => goto("report"));
}

function renderReport() {
  const c = state.caseData;
  const correct = state.selectedChoice === c.correctChoice;

  const budgetRows = Object.entries(c.budget).map(([k,v]) => `
    <div class="metricRow">
      <div class="lbl">${escapeHtml(k)}</div>
      <div class="bar"><i style="width:${v}%;"></i></div>
      <div class="v">${v}%</div>
    </div>
  `).join("");

  document.getElementById("stage").innerHTML = `
    <div class="card">
      <h2>Marketing Learning Report</h2>
      <p class="lead">Case: <b>${escapeHtml(c.company)}</b> — ${escapeHtml(c.industry)}</p>

      <div class="reportGrid">
        <div class="reportTile">
          <h4>The Primary Mistake</h4>
          <div class="body"><b style="color:var(--accent-2);">${escapeHtml(c.primaryMistake)}</b></div>
        </div>
        <div class="reportTile">
          <h4>Your Verdict</h4>
          <div class="body">${correct
            ? `<b style="color:var(--good);">Correct.</b> You matched the analyst's read of this case.`
            : `<b style="color:var(--warn);">Not the primary root cause.</b> You picked <em>"${escapeHtml(c.choices.find(x => x.id === state.selectedChoice)?.label || "—")}"</em>. That's a real issue in the case, but not the biggest.`
          }</div>
        </div>

        <div class="reportTile full">
          <h4>Expert Explanation</h4>
          <div class="body">${escapeHtml(c.explanation)}</div>
        </div>

        <div class="reportTile full">
          <h4>Suggested Improvements</h4>
          <ul>${c.improvements.map(i => `<li>${escapeHtml(i)}</li>`).join("")}</ul>
        </div>

        <div class="reportTile full">
          <h4>Original Budget Allocation</h4>
          <div class="metricBars" style="margin-top:8px;">
            ${budgetRows}
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn primary" id="newCase">↻ Take a New Case</button>
      </div>
    </div>
  `;

  document.getElementById("newCase").addEventListener("click", () => {
    let next;
    do { next = rand(CASES); } while (next.id === c.id && CASES.length > 1);
    state.caseData = next;
    state.selectedChoice = null;
    state.revealed = false;
    goto("assign");
    window.scrollTo({ top:0, behavior:"smooth" });
  });
}

/* ---------- Confetti ---------- */
function burstConfetti() {
  const c = document.getElementById("confetti");
  c.innerHTML = "";
  const colors = ["#e46c2b","#f2a24a","#63d095","#ffd166","#7fb3ff","#ea5f8b"];
  for (let i = 0; i < 100; i++) {
    const p = document.createElement("i");
    p.style.left = Math.random() * 100 + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.7 + Math.random() * 1.8) + "s";
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
  }
  c.classList.add("show");
  setTimeout(() => c.classList.remove("show"), 3500);
}

/* ---------- Nav ---------- */
function goto(next) {
  state.stage = next;
  renderStepper();
  if (next === "welcome")     renderWelcome();
  else if (next === "assign") renderAssign();
  else if (next === "investigate") renderInvestigate();
  else if (next === "solve")  renderSolve();
  else if (next === "closed") renderClosed();
  else if (next === "report") renderReport();
  window.scrollTo({ top:0, behavior:"smooth" });
}

/* ---------- Init ---------- */
renderStepper();
renderWelcome();
</script>

</html>
