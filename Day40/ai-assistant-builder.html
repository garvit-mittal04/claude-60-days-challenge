<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>🤖 AI Assistant Builder — Day 40 · #60DayClaudeChallenge</title>
<style>
/* =============================================================
   AI ASSISTANT BUILDER — Day 40
   Single HTML file · Vanilla CSS + JS · Calls Claude API directly
   Four assistants in one app · Full documentation panel
   ============================================================= */

:root {
  --bg:        #0b0f17;
  --bg-2:      #10141e;
  --panel:     #171d2a;
  --panel-2:   #1e2634;
  --line:      #2a3140;
  --line-2:    #3a4256;
  --text:      #eaf0f9;
  --text-dim:  #b0bacb;
  --text-mute: #7a869d;

  --accent:    #a687ff;
  --accent-2:  #c9b3ff;
  --accent-soft: rgba(166,135,255,.14);

  --good:      #4ade80;
  --bad:       #f56565;
  --warn:      #fbbf24;

  --purple:    #a687ff;
  --pink:      #ff7bb5;
  --sky:       #6bb8ff;
  --mint:      #4ade80;

  --shadow:    0 20px 60px rgba(0,0,0,.55);
  --radius:    14px;
  --easing:    cubic-bezier(.2,.8,.2,1);
  --mono:      "JetBrains Mono", ui-monospace, monospace;
}

body.lightMode {
  --bg:        #f6f8fb;
  --bg-2:      #ffffff;
  --panel:     #ffffff;
  --panel-2:   #f0f3f8;
  --line:      #e2e8f0;
  --line-2:    #cbd5e1;
  --text:      #0f172a;
  --text-dim:  #475569;
  --text-mute: #94a3b8;
  --shadow:    0 12px 40px rgba(15,23,42,.08);
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(1000px 700px at 10% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(800px 500px at 100% 100%, rgba(107,184,255,.06), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.app { max-width:1180px; margin:0 auto; padding:22px 24px 60px; }

/* ========== HEADER ========== */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0 16px; margin-bottom:20px; flex-wrap:wrap; gap:12px;
  border-bottom:1px solid var(--line);
}
.brand { display:flex; align-items:center; gap:14px; }
.logo {
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(135deg, var(--accent), var(--sky));
  display:flex; align-items:center; justify-content:center; font-size:26px;
  box-shadow: 0 12px 30px rgba(0,0,0,.4);
}
.brand h1 { margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; }
.brand .sub { font-size:11px; color:var(--text-mute); letter-spacing:2px; text-transform:uppercase; font-weight:700; }

.headActions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.iconBtn {
  background:var(--panel); border:1px solid var(--line);
  color:var(--text-dim); padding:8px 14px; border-radius:10px; cursor:pointer;
  font-size:13px; font-weight:700;
  transition:border-color .12s, background .15s, color .12s;
  display:inline-flex; align-items:center; gap:6px;
}
.iconBtn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

.statusPill {
  padding:6px 12px; border-radius:999px; font-size:10px; letter-spacing:1.5px; text-transform:uppercase;
  font-weight:800; background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
}
.statusPill.ready { background:rgba(74,222,128,.12); border-color:var(--good); color:var(--good); }
.statusPill.no { background:rgba(245,101,101,.10); border-color:var(--bad); color:var(--bad); }

/* ========== ASSISTANT PICKER ========== */
.assistantGrid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:10px; margin-bottom:18px; }
.assistantCard {
  background:linear-gradient(180deg, var(--panel), var(--bg-2));
  border:2px solid var(--line); border-radius:14px; padding:16px 18px; cursor:pointer;
  transition: border-color .15s, background .2s, transform .1s var(--easing);
  text-align:left;
  display:flex; gap:12px; align-items:flex-start;
}
.assistantCard:hover { transform: translateY(-2px); border-color:var(--accent); background:var(--accent-soft); }
.assistantCard.active { border-color:var(--accent); background:var(--accent-soft); box-shadow: 0 8px 26px rgba(166,135,255,.18); }
.assistantCard .icon { font-size:26px; flex-shrink:0; width:40px; text-align:center; }
.assistantCard h4 { margin:0 0 3px; font-size:14px; font-weight:800; letter-spacing:-.2px; }
.assistantCard .d { color:var(--text-dim); font-size:12px; line-height:1.55; }

/* ========== CARD ========== */
.card {
  background:linear-gradient(180deg, var(--panel), var(--bg-2));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:24px 26px; box-shadow:var(--shadow); margin-bottom:16px;
  animation: fadeIn .3s var(--easing) both;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }

.card h2 { margin:0 0 4px; font-size:22px; font-weight:800; letter-spacing:-.3px; }
.card .lead { color:var(--text-dim); font-size:13.5px; line-height:1.65; margin-top:4px; }
.card h4.sect { margin:0 0 8px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800; }

/* ========== API KEY INPUT ========== */
.keyBar {
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
  padding:14px 16px; margin-bottom:16px;
  display:flex; align-items:center; gap:10px; flex-wrap:wrap;
}
.keyBar .lbl { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-mute); font-weight:800; flex-shrink:0; }
.keyBar input {
  flex:1; min-width:220px; background:var(--bg); border:1.5px solid var(--line-2); border-radius:8px;
  padding:8px 12px; color:var(--text); font-family:var(--mono); font-size:12.5px;
  outline:none; transition:border-color .12s;
}
.keyBar input:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.keyBar .warn { font-size:11px; color:var(--warn); font-weight:600; }
.keyBar .warn::before { content:"⚠️ "; }

/* ========== INPUT / OUTPUT ========== */
.ioGrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
@media(max-width:900px){ .ioGrid { grid-template-columns:1fr; } }

.inputSection { display:flex; flex-direction:column; gap:12px; }
.textArea {
  width:100%; min-height:200px; background:var(--bg); border:1.5px solid var(--line-2); border-radius:12px;
  padding:14px 16px; color:var(--text); font-family:-apple-system, system-ui, sans-serif; font-size:14px;
  line-height:1.55; outline:none; transition:border-color .12s, box-shadow .12s; resize:vertical;
}
.textArea:focus { border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
.textArea.context { min-height:100px; }
.inputLabel {
  font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:var(--text-mute); font-weight:800;
  margin-bottom:6px; display:flex; justify-content:space-between; align-items:center;
}

.outputCard {
  background: var(--bg); border:1.5px solid var(--line-2); border-radius:12px;
  padding:20px 22px; min-height:400px;
  overflow-y:auto; max-height:600px;
}
.outputCard .empty {
  text-align:center; padding:60px 20px; color:var(--text-mute); font-size:14px;
}
.outputCard .empty .icon { font-size:44px; margin-bottom:10px; opacity:.5; }

/* Loading */
.loading { display:flex; align-items:center; justify-content:center; gap:16px; padding:60px 20px; }
.spinner {
  width:32px; height:32px; border:3px solid rgba(166,135,255,.2);
  border-top-color:var(--accent); border-radius:50%;
  animation: spin .8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.loading .msg { font-size:14px; color:var(--text-dim); font-weight:600; }
.loading .thinking {
  display:inline-block; margin-top:4px; font-family:var(--mono); font-size:12px; color:var(--text-mute);
}
.loading .thinking span {
  display:inline-block; opacity:.4; animation: pulse 1.4s ease-in-out infinite;
}
.loading .thinking span:nth-child(2) { animation-delay: .2s; }
.loading .thinking span:nth-child(3) { animation-delay: .4s; }
@keyframes pulse { 50% { opacity:1; } }

/* Markdown output */
.md h1 { font-size:22px; margin:14px 0 8px; font-weight:800; }
.md h2 { font-size:18px; margin:14px 0 6px; font-weight:800; color:var(--accent); }
.md h3 { font-size:15px; margin:12px 0 4px; font-weight:800; color:var(--text); letter-spacing:1px; text-transform:uppercase; font-size:11px; }
.md p  { margin:8px 0; line-height:1.7; color:var(--text); font-size:14px; }
.md ul, .md ol { margin:6px 0; padding-left:22px; }
.md li { margin:4px 0; color:var(--text); line-height:1.65; }
.md li::marker { color:var(--accent); }
.md strong { color:var(--text); font-weight:800; }
.md em { color:var(--text-dim); font-style:italic; }
.md code {
  font-family:var(--mono); background:var(--panel-2); border:1px solid var(--line);
  padding:1px 6px; border-radius:5px; font-size:12.5px; color:var(--accent);
}
.md pre {
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:14px 16px; overflow-x:auto; margin:10px 0;
}
.md pre code { background:none; border:none; padding:0; color:var(--text); font-size:12.5px; }
.md blockquote {
  border-left:3px solid var(--accent); padding:6px 14px; margin:10px 0;
  color:var(--text-dim); font-style:italic;
}
.md hr { border:none; border-top:1px solid var(--line); margin:14px 0; }
.md table { border-collapse:collapse; width:100%; margin:10px 0; font-size:13px; }
.md th, .md td { border:1px solid var(--line); padding:8px 12px; text-align:left; }
.md th { background:var(--panel-2); font-weight:800; color:var(--accent); font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }

/* ========== BUTTONS ========== */
.btn {
  appearance:none; border:1px solid var(--line);
  background:var(--panel); color:var(--text); font-weight:700;
  padding:12px 20px; border-radius:10px; cursor:pointer;
  font-size:13.5px; letter-spacing:.3px;
  transition:transform .1s var(--easing), border-color .12s, background .15s;
  font-family:inherit;
}
.btn:hover { border-color:var(--accent); background:var(--accent-soft); }
.btn:active { transform:translateY(1px); }
.btn.primary {
  background:linear-gradient(135deg, var(--accent), var(--sky));
  color:#0a0e18; border:none; font-weight:800; padding:14px 26px; font-size:14px;
  box-shadow:0 12px 30px rgba(166,135,255,.28);
}
.btn.primary:hover { transform: translateY(-1px); color:#0a0e18; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn.compact { padding:6px 12px; font-size:12px; }

/* ========== DOCUMENTATION PANEL ========== */
.docPanel {
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  margin-bottom:16px; overflow:hidden;
}
.docHeader {
  padding:14px 18px; cursor:pointer;
  display:flex; justify-content:space-between; align-items:center;
  background:var(--panel-2);
  border-bottom:1px solid var(--line);
  transition: background .15s;
}
.docHeader:hover { background:var(--accent-soft); }
.docHeader h3 { margin:0; font-size:14px; font-weight:800; letter-spacing:-.2px; }
.docHeader .arrow { color:var(--accent); font-size:14px; transition: transform .15s; }
.docPanel.closed .docHeader .arrow { transform: rotate(-90deg); }
.docBody { padding:18px 22px; }
.docPanel.closed .docBody { display:none; }
.docBody h4 { margin:14px 0 6px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800; }
.docBody p { color:var(--text-dim); font-size:13.5px; line-height:1.7; margin:6px 0; }
.docBody ul { margin:6px 0; padding-left:22px; color:var(--text-dim); font-size:13.5px; line-height:1.65; }
.docBody ul li::marker { color:var(--accent); }
.docBody pre {
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:14px 16px; margin:8px 0; overflow-x:auto;
  font-family:var(--mono); font-size:12px; line-height:1.55; color:var(--text-dim);
  white-space:pre-wrap; word-wrap:break-word;
}

.actionBar { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-start; margin-top:14px; align-items:center; }
.actionBar .leftActions { margin-right:auto; }

.toast {
  position:fixed; top:20px; right:20px; z-index:100;
  background:var(--panel-2); border:1px solid var(--accent);
  color:var(--text); padding:12px 18px; border-radius:10px;
  font-size:13.5px; font-weight:700; box-shadow:var(--shadow);
  animation: toastIn .3s ease-out, toastOut .3s ease-in 2.6s forwards;
  max-width:360px;
}
.toast.good { border-color:var(--good); color:var(--good); }
.toast.bad  { border-color:var(--bad);  color:var(--bad); }
@keyframes toastIn  { from { opacity:0; transform:translateX(20px);} to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(20px); } }

.footer { color:var(--text-mute); font-size:11px; text-align:center; margin-top:22px; letter-spacing:1px; line-height:1.6; }

@media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }
</style>
</head>
<body>

<div class="app">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="brand">
      <div class="logo">🤖</div>
      <div>
        <h1>AI Assistant Builder</h1>
        <div class="sub">Day 40 · #60DayClaudeChallenge</div>
      </div>
    </div>
    <div class="headActions">
      <span class="statusPill" id="apiStatus">🔑 API Key Needed</span>
      <button class="iconBtn" id="themeBtn">🌙 Dark</button>
    </div>
  </header>

  <!-- ============ ASSISTANT PICKER ============ -->
  <h4 class="sect" style="margin:0 0 8px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800;">Choose an assistant</h4>
  <div class="assistantGrid" id="assistantGrid"></div>

  <!-- ============ MAIN ============ -->
  <div id="stage"></div>

  <p class="footer">
    Runs your Claude API key entirely in your browser. Key is stored in localStorage only. No proxy, no server. Built for Day 40 of #60DayClaudeChallenge
  </p>
</div>

<script>
/* =============================================================
   AI ASSISTANT BUILDER — Day 40 · Logic
   ============================================================= */

/* ============================================================
   ASSISTANT LIBRARY — 4 domains, each with a purpose-built system prompt
   ============================================================ */
const ASSISTANTS = {
  resume: {
    key:"resume",
    name:"Resume & Career Coach",
    icon:"📄",
    tag:"ATS-focused resume analysis and rewrite. Optional target JD for tailoring.",
    inputLabel:"Paste your resume (full text)",
    inputPlaceholder:"Paste your full resume text here — every section, every bullet. The more complete, the better the analysis.",
    contextLabel:"Optional: Paste the job description you're targeting",
    contextPlaceholder:"Paste the target job description for tailored ATS keyword analysis and bullet rewrites. Leave blank for general review.",
    systemPrompt: `You are an elite resume and career coach. You specialize in ATS-optimization, quantified impact bullets, and job-specific tailoring for mid-market and Fortune 500 roles.

Your role: Analyze the user's resume, identify structural and content weaknesses, and return an actionable improvement plan.

Constraints:
- Never invent metrics, experience, or credentials the resume doesn't already contain.
- Suggest rewrites only where the user has stated the underlying experience.
- Focus on visible impact (metrics, scope, business outcome) over generic strong verbs.
- If a target job description is provided, tailor your keyword and framing recommendations to that specific role.
- Do not evaluate the person; evaluate the artifact.

Output format (use markdown):

## Match Score
[If a JD is provided, a 0-100 match score with 2-sentence explanation. Otherwise "N/A — no target JD provided."]

## Top 3 Strengths
[3 bullets — what the resume already does well, with specific examples from the resume]

## Top 3 Gaps
[3 bullets — the highest-leverage weaknesses. Be specific about which bullet or section, and why.]

## Suggested Rewrites
[3-5 specific bullet rewrites. For each, show the OLD line, then the NEW line, then a one-line "why this is stronger" note.]

## Missing Keywords (if JD provided)
[Table of keywords/skills present in the JD but missing from the resume, and which section they should be added to.]

## Next Steps
[3 concrete next actions the user should take before their next application.]

Edge cases:
- If the resume is very short (under 200 words), note that first and ask for the full text before analyzing.
- If the resume contains obvious sensitive info (SSN, DOB), note it should be removed before applying.
- If no target JD is provided, still provide a strong generic ATS review.`
  },

  business: {
    key:"business",
    name:"Business Case Analyzer",
    icon:"📊",
    tag:"Reads a business scenario/memo and returns SWOT, positioning, and GTM angles.",
    inputLabel:"Paste your business scenario, memo, or product brief",
    inputPlaceholder:"Paste the scenario — company context, product, competitive landscape, current challenge, whatever's relevant.",
    contextLabel:"Optional: What specific decision or question do you want analyzed?",
    contextPlaceholder:"E.g., 'Should we enter the enterprise segment?' or 'How should we price the new tier?' — leave blank for a general strategic breakdown.",
    systemPrompt: `You are a senior strategy consultant. You give McKinsey-quality strategic analysis with the plain-language clarity of a great operator.

Your role: Read the user's business scenario and return a structured strategic breakdown that helps them make a decision.

Constraints:
- Ground every claim in something the user stated. Do not invent market sizes, competitor names, or numbers.
- If you need information you don't have, explicitly ask for it in a "What I would want to know" section.
- Prefer specificity over jargon. If you use a framework name, explain what it means in one line.
- Give a recommendation, not a hedge. Then defend it.

Output format (use markdown):

## Situation
[2-3 sentences restating the scenario as you understood it. Confirms alignment before analysis.]

## SWOT
| Strengths | Weaknesses | Opportunities | Threats |
|---|---|---|---|
| ... | ... | ... | ... |

## Positioning
[Where the company/product sits in its category. Who they're for. Who they're not for. What their unique claim is.]

## Recommended Path Forward
[3-4 sentences with your specific recommendation, followed by 3 concrete next steps.]

## What I Would Want to Know
[3-4 bullets naming the specific data or context that would sharpen the recommendation.]

Edge cases:
- If the scenario is one sentence, ask for more context before analyzing.
- If the user asks for a decision but gives contradictory info, name the contradiction explicitly.
- Never recommend illegal, unethical, or clearly self-destructive actions.`
  },

  data: {
    key:"data",
    name:"Data Analyst Assistant",
    icon:"📈",
    tag:"SQL generation, analysis plans, and metric interpretation. Optional schema context.",
    inputLabel:"Describe your data question, or paste a metric to interpret",
    inputPlaceholder:"E.g., 'Write a SQL query to find users who signed up in Q1 but haven't logged in for 30 days.' Or paste a chart/metric summary for interpretation.",
    contextLabel:"Optional: Paste your table schemas or SQL dialect",
    contextPlaceholder:"E.g., 'users(id, created_at, email); events(user_id, event_type, ts). PostgreSQL.' — leave blank for general SQL.",
    systemPrompt: `You are a senior data analyst who has shipped analysis at product companies like Airbnb, Stripe, and Notion. You write clean, correct SQL and communicate insights in the vocabulary of PMs, not engineers.

Your role: Take the user's data question and return a query, an analysis plan, or an interpretation — whichever the question actually calls for.

Constraints:
- Never assume table or column names not stated by the user. If they didn't give a schema, name your assumptions and ask.
- Use the SQL dialect they specified (Postgres, MySQL, BigQuery, Snowflake). Default to standard SQL if unspecified.
- Comment every non-obvious CTE or join.
- If the question is really an analysis question ("why are conversions dropping"), answer it as an analysis plan, not as one query.
- Interpret metrics through the lens of what the PM/business actually cares about — LTV, retention, activation, conversion, revenue.

Output format (use markdown):

## What I understood
[1-2 sentences restating the question.]

## The Query / Analysis Plan
\`\`\`sql
-- Your SQL here, commented.
\`\`\`
Or, for analysis questions: a numbered analysis plan.

## Assumptions
[Bullets naming every schema/table/column assumption you made.]

## What the result would tell you
[2-3 sentences on how to interpret the output.]

## Follow-up questions worth asking
[2-3 sharper questions the user should ask after seeing the result.]

Edge cases:
- If they didn't give a schema, still write a plausible query but list every assumption.
- If the question is about a metric that doesn't exist ("why is our NPS scoring wrong"), ask for the actual data instead of guessing.
- Never invent user counts, conversion rates, or business numbers.`
  },

  interview: {
    key:"interview",
    name:"Interview Prep Coach",
    icon:"🎯",
    tag:"Behavioral + case-style practice with specific coaching feedback.",
    inputLabel:"Paste your STAR-format answer, or ask for a mock question",
    inputPlaceholder:"Paste your full answer to a behavioral or case question and get structured coaching. Or ask 'Give me a behavioral question for a Product Manager role at a growth-stage SaaS company.'",
    contextLabel:"Optional: Role, company type, or specific competency you're targeting",
    contextPlaceholder:"E.g., 'Product Manager at a growth-stage SaaS company. Focus on: dealing with ambiguity, cross-functional influence.'",
    systemPrompt: `You are a senior interview coach who has prepped candidates for offers at Stripe, Notion, McKinsey, and top-tier PM/consulting/analyst roles. You give sharp, honest, specific feedback — never generic.

Your role: Either evaluate the user's practice answer, or generate a targeted mock question with coaching notes.

Constraints:
- If they gave you an answer, evaluate it. If they asked for a question, generate one.
- Structure feedback around the STAR framework: Situation, Task, Action, Result. Name what's strong and what's weak in each.
- Prefer specific coaching ("your Result was vague — quantify with a number or business outcome") over generic praise.
- Do not fabricate the user's experience. If their answer references something they didn't fully explain, ask a clarifying question instead.
- Match the tone to the role type they're targeting (product/consulting/analyst all evaluate slightly different things).

Output format (when evaluating an answer):

## Question you appeared to be answering
[Your read of what question this answer was for.]

## STAR Breakdown
- **Situation:** [what's strong / what's weak]
- **Task:** [what's strong / what's weak]
- **Action:** [what's strong / what's weak]
- **Result:** [what's strong / what's weak]

## Overall Rating
[1-5 with a one-sentence justification. 1 = "not ready to give this answer in an interview." 5 = "this would land in a Big 3 consulting final round."]

## The single most important edit
[Name the ONE change that moves this answer up a full point on the rating.]

## Rewritten version
[Show your ~150-word tightened rewrite of the answer.]

Output format (when generating a mock question):

## The Question
[The question, phrased exactly as it would be asked in an interview.]

## What they're actually testing
[2-3 sentences on the competency underneath the question.]

## Structure your answer around
[3-4 bullets on the specific hooks a strong answer would hit.]

## Common trap
[The one place average candidates lose points on this question.]

Edge cases:
- If the answer is one sentence, ask for the full STAR version.
- If they ask for a question without specifying a role, ask which role type they're targeting.
- Never give false praise — if the answer is weak, say so clearly and give a rewrite that's actually stronger.`
  }
};

/* ============================================================
   STATE
   ============================================================ */
const state = {
  activeKey: "resume",
  apiKey: localStorage.getItem("aab.apiKey") || "",
  input: "",
  context: "",
  loading: false,
  response: null,
  error: null,
};

const el = (id) => document.getElementById(id);

/* Utils */
function esc(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg, kind="") {
  const t = document.createElement("div");
  t.className = "toast" + (kind ? " " + kind : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

/* Theme */
el("themeBtn").addEventListener("click", () => {
  const isLight = document.body.classList.toggle("lightMode");
  el("themeBtn").textContent = isLight ? "☀️ Light" : "🌙 Dark";
});

/* API Status pill */
function updateApiStatus() {
  const p = el("apiStatus");
  if (state.apiKey && state.apiKey.startsWith("sk-ant-")) {
    p.textContent = "🔑 API Key ✓";
    p.className = "statusPill ready";
  } else if (state.apiKey) {
    p.textContent = "🔑 Invalid Key";
    p.className = "statusPill no";
  } else {
    p.textContent = "🔑 API Key Needed";
    p.className = "statusPill";
  }
}

/* ============================================================
   MARKDOWN RENDERING (minimal, no external lib)
   ============================================================ */
function renderMarkdown(md) {
  if (!md) return "";
  const lines = md.split("\n");
  const out = [];
  let inCode = false, codeLang = "", codeLines = [];
  let inTable = false, tableRows = [];
  let listStack = []; // {type, indent}

  function closeLists(toIndent) {
    while (listStack.length && listStack[listStack.length-1].indent >= toIndent) {
      const t = listStack.pop();
      out.push(t.type === "ul" ? "</ul>" : "</ol>");
    }
  }
  function flushTable() {
    if (!inTable || !tableRows.length) return;
    const header = tableRows[0];
    const rows = tableRows.slice(2);
    let t = "<table><thead><tr>";
    for (const c of header) t += `<th>${inlineMd(c)}</th>`;
    t += "</tr></thead><tbody>";
    for (const r of rows) {
      t += "<tr>";
      for (const c of r) t += `<td>${inlineMd(c)}</td>`;
      t += "</tr>";
    }
    t += "</tbody></table>";
    out.push(t);
    tableRows = [];
    inTable = false;
  }

  for (const line of lines) {
    // Code blocks
    if (line.startsWith("```")) {
      if (inCode) {
        out.push(`<pre><code class="lang-${esc(codeLang)}">${esc(codeLines.join("\n"))}</code></pre>`);
        codeLines = []; inCode = false; codeLang = "";
      } else {
        closeLists(-1); flushTable();
        inCode = true; codeLang = line.slice(3).trim();
      }
      continue;
    }
    if (inCode) { codeLines.push(line); continue; }

    // Tables
    if (line.startsWith("|") && line.endsWith("|")) {
      inTable = true;
      const cells = line.slice(1, -1).split("|").map(c => c.trim());
      tableRows.push(cells);
      continue;
    } else if (inTable) {
      flushTable();
    }

    // Headers
    const h = line.match(/^(#{1,6})\s+(.*)$/);
    if (h) { closeLists(-1); const level = h[1].length; out.push(`<h${level}>${inlineMd(h[2])}</h${level}>`); continue; }

    // Blockquote
    if (line.startsWith(">")) { closeLists(-1); out.push(`<blockquote>${inlineMd(line.slice(1).trim())}</blockquote>`); continue; }

    // HR
    if (/^(-{3,}|_{3,}|\*{3,})$/.test(line.trim())) { closeLists(-1); out.push("<hr/>"); continue; }

    // Lists
    const ul = line.match(/^(\s*)[-*+]\s+(.*)$/);
    const ol = line.match(/^(\s*)\d+\.\s+(.*)$/);
    if (ul || ol) {
      const indent = (ul || ol)[1].length;
      const text = (ul || ol)[2];
      const type = ul ? "ul" : "ol";
      // Adjust stack
      while (listStack.length && listStack[listStack.length-1].indent > indent) {
        const t = listStack.pop();
        out.push(t.type === "ul" ? "</ul>" : "</ol>");
      }
      if (!listStack.length || listStack[listStack.length-1].indent < indent) {
        out.push(type === "ul" ? "<ul>" : "<ol>");
        listStack.push({ type, indent });
      } else if (listStack[listStack.length-1].type !== type) {
        const t = listStack.pop();
        out.push(t.type === "ul" ? "</ul>" : "</ol>");
        out.push(type === "ul" ? "<ul>" : "<ol>");
        listStack.push({ type, indent });
      }
      out.push(`<li>${inlineMd(text)}</li>`);
      continue;
    }

    // Empty line — close lists
    if (line.trim() === "") { closeLists(-1); continue; }

    // Paragraph
    closeLists(-1);
    out.push(`<p>${inlineMd(line)}</p>`);
  }
  closeLists(-1); flushTable();
  if (inCode) out.push(`<pre><code>${esc(codeLines.join("\n"))}</code></pre>`);
  return out.join("\n");
}
function inlineMd(text) {
  return esc(text)
    .replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>")
    .replace(/\*(.+?)\*/g, "<em>$1</em>")
    .replace(/`(.+?)`/g, "<code>$1</code>");
}

/* ============================================================
   RENDER PICKER
   ============================================================ */
function renderPicker() {
  const grid = el("assistantGrid");
  grid.innerHTML = Object.values(ASSISTANTS).map(a => `
    <button class="assistantCard ${a.key === state.activeKey ? "active" : ""}" data-key="${a.key}">
      <div class="icon">${a.icon}</div>
      <div>
        <h4>${esc(a.name)}</h4>
        <div class="d">${esc(a.tag)}</div>
      </div>
    </button>
  `).join("");
  grid.querySelectorAll(".assistantCard").forEach(b => {
    b.addEventListener("click", () => {
      state.activeKey = b.dataset.key;
      state.response = null; state.error = null;
      state.input = ""; state.context = "";
      renderPicker();
      renderStage();
    });
  });
}

/* ============================================================
   RENDER MAIN
   ============================================================ */
function renderStage() {
  const a = ASSISTANTS[state.activeKey];
  const stage = el("stage");

  stage.innerHTML = `
    <div class="card">
      <div style="display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px; margin-bottom:14px;">
        <div>
          <h2><span style="margin-right:8px;">${a.icon}</span>${esc(a.name)}</h2>
          <div class="lead">${esc(a.tag)}</div>
        </div>
      </div>

      <div class="keyBar">
        <span class="lbl">Claude API Key</span>
        <input type="password" id="apiKeyInput" placeholder="sk-ant-..." value="${esc(state.apiKey)}" />
        <button class="btn compact" id="saveKeyBtn">Save</button>
        <span class="warn">Key is stored in your browser localStorage only. Get one at console.anthropic.com</span>
      </div>

      <div class="ioGrid">
        <div class="inputSection">
          <div>
            <div class="inputLabel">Primary Input</div>
            <textarea class="textArea" id="mainInput" placeholder="${esc(a.inputPlaceholder)}">${esc(state.input)}</textarea>
          </div>
          <div>
            <div class="inputLabel">${esc(a.contextLabel)}</div>
            <textarea class="textArea context" id="contextInput" placeholder="${esc(a.contextPlaceholder)}">${esc(state.context)}</textarea>
          </div>
          <div class="actionBar">
            <button class="btn primary" id="analyzeBtn" ${state.loading ? "disabled" : ""}>
              ${state.loading ? "⏳ Analyzing…" : `✨ Run ${esc(a.name)}`}
            </button>
            <button class="btn" id="clearBtn">Clear</button>
          </div>
        </div>

        <div>
          <div class="inputLabel">Response ${state.response ? '<button class="btn compact" id="copyBtn">📋 Copy</button>' : ""}</div>
          <div class="outputCard" id="outputCard">
            ${renderOutput()}
          </div>
        </div>
      </div>
    </div>

    ${renderDocPanel()}
  `;

  // Bind
  el("saveKeyBtn").addEventListener("click", saveApiKey);
  el("apiKeyInput").addEventListener("keydown", e => { if (e.key === "Enter") saveApiKey(); });
  el("mainInput").addEventListener("input", e => { state.input = e.target.value; });
  el("contextInput").addEventListener("input", e => { state.context = e.target.value; });
  el("analyzeBtn").addEventListener("click", runAssistant);
  el("clearBtn").addEventListener("click", () => {
    state.input = ""; state.context = ""; state.response = null; state.error = null;
    renderStage();
  });
  const copyBtn = el("copyBtn");
  if (copyBtn) copyBtn.addEventListener("click", () => {
    if (state.response) {
      navigator.clipboard.writeText(state.response).then(() => toast("✓ Copied to clipboard", "good"));
    }
  });

  // Doc panel toggle
  const dh = document.querySelector(".docHeader");
  if (dh) dh.addEventListener("click", () => document.querySelector(".docPanel").classList.toggle("closed"));

  updateApiStatus();
}

function renderOutput() {
  if (state.loading) {
    return `
      <div class="loading">
        <div class="spinner"></div>
        <div class="body">
          <div class="msg">Claude is thinking…</div>
          <div class="thinking">Analyzing input<span>.</span><span>.</span><span>.</span></div>
        </div>
      </div>
    `;
  }
  if (state.error) {
    return `
      <div class="empty">
        <div class="icon" style="color:var(--bad);">⚠️</div>
        <div style="color:var(--bad); font-weight:700; font-size:14px; margin-bottom:8px;">Request failed</div>
        <div style="color:var(--text-dim); font-size:13px; line-height:1.6; max-width:400px; margin:0 auto;">${esc(state.error)}</div>
      </div>
    `;
  }
  if (state.response) {
    return `<div class="md">${renderMarkdown(state.response)}</div>`;
  }
  return `
    <div class="empty">
      <div class="icon">🤖</div>
      <div>Fill in the input above and click <b style="color:var(--accent);">Run ${esc(ASSISTANTS[state.activeKey].name)}</b> to get a structured response.</div>
    </div>
  `;
}

/* ============================================================
   DOCUMENTATION PANEL
   ============================================================ */
function renderDocPanel() {
  const a = ASSISTANTS[state.activeKey];
  return `
    <div class="docPanel closed">
      <div class="docHeader">
        <h3>📚 How this assistant was built</h3>
        <span class="arrow">▼</span>
      </div>
      <div class="docBody">
        <h4>The System Prompt</h4>
        <p>Every assistant in this app is a Claude Sonnet 4.6 call with a purpose-built system prompt. Here's the actual system prompt behind <b>${esc(a.name)}</b>:</p>
        <pre>${esc(a.systemPrompt)}</pre>

        <h4>Design Choices</h4>
        <p>Every system prompt in this app follows the same four-part structure:</p>
        <ul>
          <li><b>Role.</b> Anchors the model in a specific senior-practitioner voice — not just "a helpful assistant."</li>
          <li><b>Constraints.</b> Names the things the model must NOT do (fabricate metrics, invent experience, generic praise). Constraints do more work than instructions.</li>
          <li><b>Output format.</b> Explicit markdown structure with named sections. The model returns predictable, scannable content instead of freeform prose.</li>
          <li><b>Edge cases.</b> Named failure modes (input too short, missing context, contradictory info) so the model has a specific "what to do" for each.</li>
        </ul>

        <h4>UI Decisions</h4>
        <ul>
          <li><b>Assistant picker as tabs.</b> Switching contexts is one click; each assistant preserves state independently in an actual product.</li>
          <li><b>Primary input + optional context</b> instead of many form fields. Free text is the highest-signal input for language models.</li>
          <li><b>Markdown-rendered output.</b> Structured sections read as reports, not as chat replies.</li>
          <li><b>Client-side API calls.</b> Your API key never touches a server. Uses <code>anthropic-dangerous-direct-browser-access: true</code>.</li>
        </ul>

        <h4>Future Extensions</h4>
        <ul>
          <li><b>Tool use.</b> Wire the Resume assistant to a real ATS keyword extractor; wire the Data assistant to actually run the SQL against a sample DB.</li>
          <li><b>Memory.</b> Persist previous sessions per assistant so it can reference "your last resume version" or "your last case answer."</li>
          <li><b>Multi-step workflows.</b> Chain assistants: run the Resume assistant → get rewrites → feed rewrites into the Interview Prep assistant → get mock behavioral questions grounded in the new resume.</li>
          <li><b>Streaming responses.</b> Use Claude's streaming API so tokens render as they arrive instead of one big response.</li>
          <li><b>Prompt versioning.</b> Track which system-prompt version produced which response, so improvements over time are measurable.</li>
        </ul>
      </div>
    </div>
  `;
}

/* ============================================================
   API KEY
   ============================================================ */
function saveApiKey() {
  const key = el("apiKeyInput").value.trim();
  state.apiKey = key;
  localStorage.setItem("aab.apiKey", key);
  updateApiStatus();
  if (key.startsWith("sk-ant-")) toast("✓ API key saved locally", "good");
  else if (key) toast("Key doesn't look like a Claude API key (should start with sk-ant-)", "bad");
}

/* ============================================================
   RUN ASSISTANT (API CALL)
   ============================================================ */
async function runAssistant() {
  const a = ASSISTANTS[state.activeKey];

  if (!state.apiKey) { toast("Please add your Claude API key first", "bad"); el("apiKeyInput")?.focus(); return; }
  if (!state.input.trim()) { toast("Please add some input to analyze", "bad"); el("mainInput")?.focus(); return; }

  state.loading = true; state.response = null; state.error = null;
  renderStage();

  const userMessage = state.context.trim()
    ? `${state.input}\n\n---\n\nAdditional context:\n${state.context}`
    : state.input;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "x-api-key": state.apiKey,
        "anthropic-version": "2023-06-01",
        "anthropic-dangerous-direct-browser-access": "true",
      },
      body: JSON.stringify({
        model: "claude-sonnet-4-5",
        max_tokens: 3000,
        system: a.systemPrompt,
        messages: [{ role: "user", content: userMessage }],
      }),
    });

    if (!response.ok) {
      let msg = `API returned ${response.status}`;
      try {
        const err = await response.json();
        msg = err?.error?.message || msg;
      } catch {}
      throw new Error(msg);
    }

    const data = await response.json();
    const text = data?.content?.[0]?.text || "";
    if (!text) throw new Error("Empty response from API");

    state.response = text;
    state.loading = false;
    renderStage();
    toast("✓ Response ready", "good");

  } catch (e) {
    console.error(e);
    state.error = e.message || String(e);
    state.loading = false;
    renderStage();
  }
}

/* ============================================================
   INIT
   ============================================================ */
renderPicker();
renderStage();
updateApiStatus();
</script>
</body>
</html>
