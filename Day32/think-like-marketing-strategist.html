<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Think Like a Marketing Strategist — Day 32 · #60DayClaudeChallenge</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  :root{
    --bg:        #06080f;
    --bg-2:      #0b1020;
    --panel:     #131a2e;
    --panel-2:   #1b2340;
    --line:      #262f4c;
    --line-2:    #303a5f;
    --text:      #f2f4fb;
    --text-dim:  #a6afc9;
    --text-mute: #6b7599;
    --brand:     #a879ff;
    --brand-2:   #58c9ff;
    --pink:      #ff6bb0;
    --good:      #2dd4a8;
    --warn:      #ffb547;
    --bad:       #ff6679;
    --shadow:    0 22px 60px rgba(0,0,0,.5);
    --radius:    14px;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html, body {
    margin:0; padding:0; min-height:100%;
    background:
      radial-gradient(1200px 800px at 10% -10%, rgba(168,121,255,.22), transparent 60%),
      radial-gradient(1000px 700px at 110% 110%, rgba(88,201,255,.16), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Inter,Roboto,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  .app { max-width:1180px; margin:0 auto; padding:24px 18px 60px; }

  /* Header */
  header { display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; flex-wrap:wrap; gap:10px; }
  .brand { display:flex; align-items:center; gap:12px; }
  .logo {
    width:44px; height:44px; border-radius:12px;
    background:linear-gradient(135deg, var(--brand), var(--brand-2));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    box-shadow:0 10px 24px rgba(168,121,255,.4);
  }
  .brand h1 { margin:0; font-size:18px; letter-spacing:.2px; }
  .brand .sub { font-size:10px; color:var(--text-mute); letter-spacing:3px; text-transform:uppercase; font-weight:700; }
  .pill { font-size:10px; font-weight:800; letter-spacing:2px; padding:6px 12px; border-radius:999px;
    background:rgba(168,121,255,.14); color:#e5d5ff; border:1px solid rgba(168,121,255,.4); }

  /* Progress stepper */
  .steps { display:flex; gap:6px; margin-bottom:18px; }
  .step { flex:1; height:4px; background:#1a223e; border-radius:2px; }
  .step.done    { background:linear-gradient(90deg, var(--brand), var(--brand-2)); }
  .step.current { background:linear-gradient(90deg, var(--brand), var(--brand-2)); }

  /* Cards */
  .card {
    background: linear-gradient(180deg, var(--panel), var(--bg-2));
    border:1px solid var(--line); border-radius:var(--radius);
    padding:22px; box-shadow:var(--shadow); margin-bottom:16px;
  }
  .card h2 { margin:0 0 6px; font-size:22px; letter-spacing:-.3px; }
  .card h3 { font-size:11px; letter-spacing:2px; text-transform:uppercase; color:#e5d5ff; font-weight:800; margin:0 0 12px; display:flex; align-items:center; gap:8px; }
  .card h3 .dot { width:6px; height:6px; border-radius:50%; background:var(--brand); }
  .card .lead { color:var(--text-dim); margin-top:4px; font-size:14px; line-height:1.55; }

  /* Buttons */
  button.btn {
    appearance:none; border:1px solid var(--line);
    background:linear-gradient(180deg, #232b45, #1a223c);
    color:var(--text); font-weight:700; font-size:14px;
    padding:12px 20px; border-radius:12px; cursor:pointer;
    transition:transform .08s, border-color .12s, box-shadow .12s;
    font-family:inherit;
  }
  button.btn:hover  { border-color:var(--brand); box-shadow:0 8px 22px rgba(168,121,255,.28); }
  button.btn:active { transform:translateY(1px); }
  button.btn.primary{ background:linear-gradient(180deg, var(--brand), #7f4dd4); border-color:transparent; box-shadow:0 12px 30px rgba(168,121,255,.35); }
  button.btn.ghost  { background:transparent; }
  button.btn:disabled { opacity:.45; cursor:not-allowed; box-shadow:none; }

  /* Welcome mode picker */
  .modes { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; margin-top:16px; }
  @media(max-width:820px) { .modes { grid-template-columns:1fr; } }
  .mode {
    background:linear-gradient(180deg, #1a2140, #131a30);
    border:2px solid var(--line); border-radius:14px;
    padding:20px; cursor:pointer;
    transition:transform .1s, border-color .15s, box-shadow .15s;
    text-align:left;
  }
  .mode:hover { border-color:var(--brand); box-shadow:0 14px 30px rgba(168,121,255,.2); transform:translateY(-2px); }
  .mode .emoji { font-size:34px; }
  .mode h3 { margin:8px 0 6px; font-size:18px; color:var(--text); letter-spacing:0; text-transform:none; font-weight:800; }
  .mode p { color:var(--text-dim); font-size:12.5px; line-height:1.55; margin:0; }

  /* Inputs */
  label { display:block; margin-bottom:12px; }
  label .lbl { font-size:10px; letter-spacing:1.5px; color:var(--text-dim); text-transform:uppercase; font-weight:800; margin-bottom:6px; }
  input[type=text], textarea, select {
    width:100%; background:#0e1428; border:1px solid var(--line);
    color:var(--text); border-radius:10px; padding:11px 13px;
    font-family:inherit; font-size:14px; outline:none;
    transition:border-color .12s, box-shadow .12s;
  }
  input:focus, textarea:focus, select:focus { border-color:var(--brand); box-shadow:0 0 0 3px rgba(168,121,255,.18); }
  textarea { resize:vertical; min-height:72px; }

  /* Beginner explainer box */
  .explainer {
    background:linear-gradient(180deg, #172245, #101833);
    border:1px solid #2b3a6b; border-left:4px solid var(--brand);
    border-radius:12px; padding:14px 16px; margin-bottom:14px;
  }
  .explainer .lbl {
    display:inline-block; font-size:9px; letter-spacing:2px; font-weight:800;
    color:#c8b5ff; background:rgba(168,121,255,.15);
    border:1px solid rgba(168,121,255,.4); padding:3px 10px; border-radius:999px;
    text-transform:uppercase; margin-bottom:8px;
  }
  .explainer h4 { margin:4px 0 6px; font-size:15px; color:#e5d5ff; }
  .explainer p  { margin:6px 0 0; color:var(--text-dim); font-size:13px; line-height:1.6; }

  /* Choice cards */
  .choices { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  @media(max-width:720px) { .choices { grid-template-columns:1fr; } }
  .choice {
    background:var(--panel-2); border:1.5px solid var(--line); border-radius:12px;
    padding:14px; cursor:pointer; text-align:left;
    transition:transform .08s, border-color .12s, box-shadow .12s;
  }
  .choice:hover { border-color:var(--brand); box-shadow:0 8px 22px rgba(168,121,255,.18); }
  .choice.selected { border-color:var(--brand-2); background:linear-gradient(180deg, #18283e, #122035); box-shadow:0 12px 30px rgba(88,201,255,.18); }
  .choice.selected .checkPill { background:var(--brand); color:#06080f; }
  .choice.disabled { opacity:.45; cursor:not-allowed; }
  .choice .headRow { display:flex; justify-content:space-between; align-items:center; }
  .choice .title { font-weight:800; font-size:14px; }
  .choice .desc { color:var(--text-dim); font-size:12px; margin-top:6px; line-height:1.5; }
  .choice .tag { font-size:9px; letter-spacing:1.5px; color:var(--brand-2); text-transform:uppercase; font-weight:800; margin-bottom:6px; }
  .checkPill { font-size:9px; padding:3px 8px; border-radius:999px; background:#242c48; color:var(--text-dim); font-weight:800; letter-spacing:1px; text-transform:uppercase; }

  /* Suitability badges */
  .fit { font-size:9px; padding:3px 8px; border-radius:999px; font-weight:800; letter-spacing:1px; text-transform:uppercase; margin-left:6px; }
  .fit.high { background:rgba(45,212,168,.18); color:var(--good); border:1px solid var(--good); }
  .fit.med  { background:rgba(255,181,71,.18); color:var(--warn); border:1px solid var(--warn); }
  .fit.low  { background:rgba(255,102,121,.15); color:var(--bad);  border:1px solid var(--bad); }

  /* Business/context tiles */
  .tile { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .tile .lbl { font-size:9px; letter-spacing:1.5px; color:var(--text-mute); text-transform:uppercase; font-weight:700; }
  .tile .val { font-size:14px; font-weight:700; margin-top:4px; color:var(--text); }
  .tile .val.big { font-size:18px; }
  .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
  .grid-3 { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
  .grid-4 { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
  @media(max-width:820px) { .grid-2,.grid-3,.grid-4 { grid-template-columns:1fr; } }

  /* Prompt card ("How to ask Claude") */
  .promptCard {
    background:linear-gradient(180deg, #1c1a35, #131028);
    border:1px solid #4a3a80; border-left:4px solid var(--brand);
    border-radius:12px; padding:14px 16px; margin-top:14px;
  }
  .promptCard .lbl {
    display:inline-block; font-size:9px; letter-spacing:2px; font-weight:800;
    color:var(--brand); background:rgba(168,121,255,.14);
    border:1px solid rgba(168,121,255,.35); padding:3px 10px; border-radius:999px;
    text-transform:uppercase; margin-bottom:8px;
  }
  .promptCard h4 { margin:2px 0 6px; font-size:15px; color:#e5d5ff; }
  .promptCard pre {
    background:#0a0d1c; border:1px solid var(--line); border-radius:8px;
    padding:11px 13px; margin:8px 0 0;
    color:#dcdefc; font-size:12px; line-height:1.6;
    font-family:"SF Mono","Menlo",Consolas,monospace;
    white-space:pre-wrap; word-break:break-word;
  }
  .promptCard .copyBtn {
    margin-top:8px; background:transparent; color:var(--brand); border:1px solid rgba(168,121,255,.4);
    padding:6px 12px; border-radius:8px; font-size:11px; cursor:pointer; font-weight:700;
  }
  .promptCard .copyBtn:hover { background:rgba(168,121,255,.1); }
  .promptCard .why { color:var(--text-mute); font-size:11.5px; margin-top:8px; font-style:italic; }

  /* Roadmap */
  .weekRow {
    display:grid; grid-template-columns:120px 1fr; gap:14px; padding:12px 14px;
    border:1px solid var(--line); border-radius:12px; background:var(--panel-2); margin-bottom:10px;
  }
  .weekRow .wLbl { font-size:10px; color:var(--brand); letter-spacing:1.5px; text-transform:uppercase; font-weight:800; }
  .weekRow .wLbl b { display:block; font-size:16px; color:var(--text); margin-top:2px; letter-spacing:0; text-transform:none; }
  .weekRow ul { margin:0; padding-left:16px; font-size:13px; color:var(--text-dim); line-height:1.6; }
  .weekRow ul li::marker { color:var(--brand-2); }

  /* Event card */
  .eventCard {
    background:linear-gradient(180deg, #3a1a1a, #1a0f10);
    border:1.5px solid var(--bad); border-radius:14px; padding:16px;
    margin-bottom:14px;
  }
  .eventCard.positive { background:linear-gradient(180deg, #12332a, #0d1a17); border-color:var(--good); }
  .eventCard.neutral  { background:linear-gradient(180deg, #2a1e10, #1a1108); border-color:var(--warn); }
  .eventCard h4 { margin:0 0 6px; font-size:16px; }
  .eventCard p  { margin:0; color:var(--text-dim); font-size:13px; line-height:1.55; }

  /* Growth Report */
  .kpiRow { display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
  @media(max-width:820px) { .kpiRow { grid-template-columns:repeat(2,1fr); } }
  .kpi { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:12px 14px; }
  .kpi .lbl { font-size:9px; letter-spacing:1.5px; color:var(--text-mute); text-transform:uppercase; font-weight:700; }
  .kpi .val { font-size:26px; font-weight:800; margin-top:2px; font-variant-numeric:tabular-nums; }
  .kpi .val.brand { background:linear-gradient(90deg, var(--brand), var(--brand-2)); -webkit-background-clip:text; background-clip:text; color:transparent; }
  .kpi .val.good  { color:var(--good); }
  .kpi .val.warn  { color:var(--warn); }
  .kpi .bar { height:6px; background:#0d1428; border-radius:3px; overflow:hidden; margin-top:8px; }
  .kpi .bar i { display:block; height:100%; background:linear-gradient(90deg, var(--brand), var(--brand-2)); transition:width .8s cubic-bezier(.2,.8,.2,1); }

  .lessonList { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
  .lessonList h4 { margin:0 0 8px; font-size:11px; letter-spacing:1.5px; color:#e5d5ff; text-transform:uppercase; font-weight:800; }
  .lessonList ul { margin:0; padding-left:18px; color:var(--text-dim); font-size:13.5px; line-height:1.7; }
  .lessonList ul li::marker { color:var(--brand); }

  .footer { color:var(--text-mute); font-size:11px; text-align:center; margin-top:14px; }
  .actions { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; margin-top:14px; }
  .hint { font-size:11px; color:var(--text-mute); margin-top:8px; font-style:italic; }
</style>
</head>

    ]},
    { id:"spike",       kind:"neutral",  title:"📈 A sudden follower spike", desc:"You're up 1,000 followers in a week and you don't know why. Analytics is unclear.", choices:[

/* ---------- HELPERS ---------- */
const rand   = arr => arr[Math.floor(Math.random()*arr.length)];
const clamp  = (v, lo=0, hi=100) => Math.max(lo, Math.min(hi, v));

/* ---------- PROMPT CARD ---------- */
function PromptCard({ title, why, prompt }) {
  const [copied, setCopied] = useState(false);
  function copy() {
    navigator.clipboard?.writeText(prompt).then(() => { setCopied(true); setTimeout(() => setCopied(false), 1500); });
  }
  return (
    <div className="promptCard">
      <div className="lbl">🤖 How to ask Claude</div>
      <h4>{title}</h4>
      <pre>{prompt}</pre>
      <button className="copyBtn" onClick={copy}>{copied ? "✓ Copied" : "📋 Copy prompt"}</button>
      <div className="why">Why this prompt: {why}</div>
    </div>
  );
}

/* ---------- STEPPER ---------- */
function Stepper({ idx, total }) {

/* ---------- GROWTH REPORT ---------- */
function GrowthReport({ context, choices, event, onReplay }) {
  const isPersonal = context.mode === "personal";

  const audienceScore = 60 + Math.floor(Math.random()*25);
  const platformScore = choices.platforms.length === 3 ? 70 + Math.floor(Math.random()*20) : 40;
  const contentScore  = choices.pillars.length === 3   ? 68 + Math.floor(Math.random()*22) : 40;
  const eventScore    = event.chosen?.good ? 78 + Math.floor(Math.random()*15) : 40 + Math.floor(Math.random()*15);
  const growth = Math.round((audienceScore + platformScore + contentScore + eventScore) / 4);

  const bestDecision = event.chosen?.good
    ? `Your response to "${event.event.title.replace(/^[^ ]+ /,'')}" — that showed strategist-level thinking under pressure.`
    : `Choosing exactly 3 content pillars, not 5. Focus is what separates strategists from beginners.`;

  const biggestMistake = event.chosen && !event.chosen.good
    ? `Your response to "${event.event.title.replace(/^[^ ]+ /,'')}" — the alternative response would have compounded better.`
    : `You picked the right platforms, but the biggest risk now is spreading effort thin across all three from day one. Anchor on one for the first 21 days.`;

  const lessons = isPersonal ? [
    "Authenticity beats polish for personal brands. Every polished version of you already exists in bigger accounts — your specific POV is the moat.",
    "Consistency compounds, but only if the direction is right. Publishing daily on the wrong pillar is worse than publishing weekly on the right one.",
    "Niche clarity is the growth lever. A follower base that can't describe what you're about in one sentence won't recommend you to anyone."
  ] : [
    "Positioning beats promotion. If prospects can't tell why you exist in one sentence, no amount of paid or organic effort fixes the underlying problem.",
    "Distribution is the multiplier. The best content in the wrong channels underperforms mediocre content in the right ones. Choose two, master them.",
    "Metrics guide the roadmap. If a week ends and you can't name the single most important number that moved, the roadmap needs sharper KPIs."
  ];

  return (
    <div className="card">
      <h2>📈 Growth Report</h2>
      <p className="lead">Here's how you thought through the strategy for <b>{context.name}</b>.</p>

      <h3 style={{marginTop:14}}><span className="dot"></span> Scorecard</h3>
      <div className="kpiRow">
        <div className="kpi"><div className="lbl">Audience Understanding</div><div className="val brand">{audienceScore}</div><div className="bar"><i style={{width:audienceScore+"%"}}></i></div></div>
        <div className="kpi"><div className="lbl">Platform Strategy</div><div className="val brand">{platformScore}</div><div className="bar"><i style={{width:platformScore+"%"}}></i></div></div>
        <div className="kpi"><div className="lbl">Content Strategy</div><div className="val brand">{contentScore}</div><div className="bar"><i style={{width:contentScore+"%"}}></i></div></div>
        <div className="kpi"><div className="lbl">Growth Potential</div><div className="val good">{growth}</div><div className="bar"><i style={{width:growth+"%"}}></i></div></div>
      </div>

      <div className="lessonList" style={{marginTop:14}}>
        <h4>🟢 Best Decision</h4>
        <p style={{margin:"4px 0 0", color:"var(--text-dim)", fontSize:13.5, lineHeight:1.7}}>{bestDecision}</p>
      </div>
      <div className="lessonList" style={{marginTop:10}}>
        <h4>🟠 Biggest Mistake / Risk</h4>
        <p style={{margin:"4px 0 0", color:"var(--text-dim)", fontSize:13.5, lineHeight:1.7}}>{biggestMistake}</p>
      </div>

      <div className="lessonList" style={{marginTop:10}}>
        <h4>🧠 Three Marketing Lessons</h4>
        <ul>
          {lessons.map((l,i) => <li key={i}>{l}</li>)}
        </ul>
      </div>

      <PromptCard
        title="Turn the report into a 90-day plan"
        why="A single 30-day sprint is a start. The strategist-level move is turning it into a 90-day plan with quarterly goals."
        prompt={`You are my marketing strategy partner. Based on the following 30-day results, propose a 90-day plan:

${isPersonal ? "Personal brand" : "Business"}: ${context.name}
Niche: ${context.niche}
Audience: ${context.audience}
Selected platforms: ${choices.platforms.join(", ")}
Selected content pillars: ${choices.pillars.join(", ")}
Best decision: ${bestDecision}
Biggest risk: ${biggestMistake}

For each of the next 3 months (Month 2, 3, 4), give me:
- The single most important theme for that month
- The one metric that must move
- The one thing I should stop doing
- The one experiment I should run`}
      />

      <div className="actions">
        <button className="btn ghost" onClick={onReplay}>↻ Try a different brand</button>
      </div>
    </div>
  );
}

/* =============================================================
   APP
   ============================================================= */
function App() {
  const STAGES = ["welcome","context","audience","platforms","pillars","roadmap","event","report"];

  const [stage, setStage] = useState("welcome");
  const [context, setContext] = useState(null);
  const [randomBiz, setRandomBiz] = useState(null);
  const [platforms, setPlatforms] = useState([]);
  const [pillars, setPillars] = useState([]);
  const [event, setEvent] = useState(null);

  function pickMode(mode) {
    if (mode === "random") {
      const biz = rand(RANDOM_BUSINESSES);
      setRandomBiz(biz);
      setContext({
        mode:"business",
        name: biz.name,
        niche: biz.industry,
        audience: biz.audience,
        goal: "solve the challenge: " + biz.challenge,
        competitors: biz.competitors,
        challenge: biz.challenge,
      });
      setStage("random-context");
    } else {
      setContext({ mode }); // will be filled by ContextInput
      setStage("context");
    }
  }

  function replay() {
    setStage("welcome");
    setContext(null); setRandomBiz(null);
    setPlatforms([]); setPillars([]); setEvent(null);
  }

  const stageIdx = STAGES.indexOf(stage === "random-context" ? "context" : stage);

  return (
    <div className="app">
      <header>
        <div className="brand">
          <div className="logo">🎯</div>
          <div>
            <h1>Think Like a Marketing Strategist · Grow This Brand</h1>
            <div className="sub">Day 32 · #60DayClaudeChallenge</div>
          </div>
        </div>
        <span className="pill">STRATEGY LAB · v1</span>
      </header>

      <Stepper idx={Math.max(0, stageIdx)} total={STAGES.length} />

      {stage === "welcome" && <Welcome onPick={pickMode} />}

      {stage === "context" && context && (
        <ContextInput
          mode={context.mode}
          onContinue={(ctx) => { setContext(ctx); setStage("audience"); }}
        />
      )}

      {stage === "random-context" && randomBiz && (
        <RandomClientCard business={randomBiz} onContinue={() => setStage("audience")} />
      )}

      {stage === "audience" && context && (
        <AudienceStep context={context} onContinue={() => setStage("platforms")} />
      )}

      {stage === "platforms" && context && (
        <PlatformStep context={context} onContinue={(sel) => { setPlatforms(sel); setStage("pillars"); }} />
      )}

      {stage === "pillars" && context && (
        <PillarStep context={context} onContinue={(sel) => { setPillars(sel); setStage("roadmap"); }} />
      )}

      {stage === "roadmap" && context && (
        <RoadmapStep context={context} onContinue={() => setStage("event")} />
      )}

      {stage === "event" && context && (
        <EventStep context={context} onContinue={(e) => { setEvent(e); setStage("report"); }} />
      )}

      {stage === "report" && context && event && (
        <GrowthReport
          context={context}
          choices={{ platforms, pillars }}
          event={event}
          onReplay={replay}
        />
      )}

      <p className="footer">
        Single HTML file · React via CDN + Babel · Vanilla CSS · No frameworks · Built for Day 32 of #60DayClaudeChallenge<br/>
        Every playthrough randomizes businesses and marketing events.
      </p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
