<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>🧭 AI Workflow Architect — Data Analysis · Day 43</title>
<style>
:root {
  --bg:#0a0f1e; --bg-2:#0f1424; --panel:#141a2e; --panel-2:#1c2340;
  --line:#252f4d; --line-2:#3a4569;
  --text:#e6ecff; --text-dim:#b0bad6; --text-mute:#7c88a8;
  --accent:#7c9cff; --accent-2:#a5bbff; --accent-soft:rgba(124,156,255,.15);
  --purple:#a687ff; --pink:#ff7bb5; --cyan:#38bdf8; --amber:#fbbf24; --mint:#4ade80;
  --good:#4ade80; --bad:#f56565; --warn:#fbbf24; --gold:#ffd166;
  --shadow:0 20px 60px rgba(0,0,0,.55);
  --radius:14px; --easing:cubic-bezier(.2,.8,.2,1);
  --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
}
body.lightMode {
  --bg:#f6f8fc; --bg-2:#fff; --panel:#fff; --panel-2:#eef2fa;
  --line:#e2e8f0; --line-2:#cbd5e1;
  --text:#0f172a; --text-dim:#475569; --text-mute:#94a3b8;
  --shadow:0 12px 40px rgba(15,23,42,.08);
}
* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(1100px 700px at 10% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(900px 600px at 100% 100%, rgba(166,135,255,.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
}
.mono { font-family:var(--mono); }
.app { max-width:1240px; margin:0 auto; padding:22px 24px 60px; }

header {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0 16px; margin-bottom:16px; flex-wrap:wrap; gap:12px;
  border-bottom:1px solid var(--line);
}
.brand { display:flex; align-items:center; gap:14px; }
.logo {
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(135deg, var(--accent), var(--purple));
  display:flex; align-items:center; justify-content:center; font-size:26px;
  box-shadow:0 12px 30px rgba(0,0,0,.4);
}
.brand h1 { margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; }
.brand .sub { font-size:11px; color:var(--text-mute); letter-spacing:2px; text-transform:uppercase; font-weight:700; }
.headActions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
.hud {
  padding:6px 12px; border-radius:999px; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  font-weight:800; background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
}
.hud b { color:var(--text); font-family:var(--mono); }
.iconBtn {
  background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
  padding:7px 12px; border-radius:8px; cursor:pointer; font-size:12px; font-weight:700;
  transition:border-color .12s, color .12s, background .15s; font-family:inherit;
}
.iconBtn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

/* Progress + stepper */
.progressBar { height:5px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-bottom:20px; }
.progressBar i { display:block; height:100%; background:linear-gradient(90deg, var(--accent), var(--purple)); border-radius:3px; transition: width .6s var(--easing); }

/* Stage strip / diagram */
.stageStrip {
  background:var(--panel); border:1px solid var(--line); border-radius:14px;
  padding:14px 18px; margin-bottom:20px; overflow-x:auto;
}
.stageStrip .row { display:flex; gap:12px; align-items:center; min-width:min-content; }
.stageChip {
  display:flex; flex-direction:column; align-items:center; gap:4px;
  padding:10px 14px; border:1.5px solid var(--line); border-radius:12px;
  background:var(--panel-2); cursor:pointer; min-width:110px;
  transition:border-color .12s, background .15s, transform .1s var(--easing);
  font-family:inherit;
  color:var(--text-dim);
  position:relative;
}
.stageChip:hover { border-color:var(--accent); transform:translateY(-2px); }
.stageChip.active { border-color:var(--accent); background:var(--accent-soft); color:var(--accent); box-shadow:0 6px 20px rgba(124,156,255,.2); }
.stageChip.done { border-color:var(--good); }
.stageChip.done::before {
  content:"✓"; position:absolute; top:-8px; right:-8px;
  width:20px; height:20px; border-radius:50%;
  background:var(--good); color:#0a0e18; display:flex; align-items:center; justify-content:center;
  font-size:11px; font-weight:900;
}
.stageChip .n { font-family:var(--mono); font-size:10px; color:var(--text-mute); letter-spacing:1.5px; font-weight:800; }
.stageChip.active .n { color:var(--accent); }
.stageChip .lbl { font-size:12px; font-weight:800; letter-spacing:.2px; white-space:nowrap; }
.stageChip .icon { font-size:22px; }
.stageStrip .arrow { color:var(--text-mute); font-size:16px; flex-shrink:0; }

.card {
  background:linear-gradient(180deg, var(--panel), var(--bg-2));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:26px 30px; box-shadow:var(--shadow); margin-bottom:16px;
  animation:fadeIn .3s var(--easing) both;
}
@keyframes fadeIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.card h2 { margin:0 0 6px; font-size:26px; font-weight:800; letter-spacing:-.3px; }
.card h3 { margin:22px 0 10px; font-size:18px; font-weight:800; letter-spacing:-.2px; }
.card h4 { margin:16px 0 8px; font-size:11px; letter-spacing:2px; text-transform:uppercase; color:var(--accent); font-weight:800; }
.card p { color:var(--text-dim); font-size:14.5px; line-height:1.75; margin:8px 0; }
.card p b { color:var(--text); font-weight:800; }
.card ul, .card ol { color:var(--text-dim); font-size:14.5px; line-height:1.75; padding-left:22px; margin:8px 0; }
.card ul li, .card ol li { margin:4px 0; }
.card ul li::marker { color:var(--accent); }
.card code {
  font-family:var(--mono); background:var(--panel-2); border:1px solid var(--line);
  padding:1px 6px; border-radius:5px; font-size:13px; color:var(--accent);
}

.tag { display:inline-block; font-size:10px; padding:3px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); font-weight:800; letter-spacing:1.5px; }
.tag.time { background:rgba(74,222,128,.10); color:var(--good); border-color:var(--good); }
.tag.status { background:rgba(251,191,36,.10); color:var(--warn); border-color:var(--warn); }

/* Objectives strip */
.objStrip {
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px;
  padding:14px 18px; margin-top:10px;
}
.objStrip h4 { margin:0 0 8px; }
.objStrip p { color:var(--text); font-size:15px; font-weight:600; line-height:1.6; margin:2px 0; }

.stageHead {
  display:flex; justify-content:space-between; align-items:flex-start;
  border-bottom:1px solid var(--line); padding-bottom:16px; margin-bottom:20px;
  flex-wrap:wrap; gap:12px;
}
.stageHead .k { font-size:10px; letter-spacing:2.5px; color:var(--accent); font-weight:800; text-transform:uppercase; }
.stageHead h3 { margin:6px 0 0; font-size:26px; font-weight:800; letter-spacing:-.3px; }

/* Two column */
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0; }
@media(max-width:820px){ .two-col { grid-template-columns:1fr; } }

.subCard { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:16px 18px; }
.subCard h4 { margin:0 0 10px; }
.subCard ul { margin-top:6px; }

/* Tool cards */
.toolGrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(230px, 1fr)); gap:10px; margin-top:10px; }
.toolCard {
  background:var(--panel); border:1.5px solid var(--line); border-radius:12px;
  padding:14px 16px; transition: border-color .12s, transform .1s;
}
.toolCard:hover { border-color:var(--accent); transform:translateY(-2px); }
.toolCard .top { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.toolCard .icon { font-size:22px; }
.toolCard .name { font-size:14px; font-weight:800; color:var(--text); }
.toolCard .why { color:var(--text-dim); font-size:12.5px; line-height:1.55; margin-top:4px; }
.toolCard .alt { color:var(--text-mute); font-size:11px; margin-top:8px; font-style:italic; }
.toolCard .badge { display:inline-block; font-size:9px; padding:2px 7px; border-radius:5px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); font-weight:800; letter-spacing:1.2px; margin-left:auto; }
.toolCard .badge.free { background:rgba(74,222,128,.10); color:var(--good); border-color:var(--good); }
.toolCard .badge.paid { background:rgba(251,191,36,.10); color:var(--warn); border-color:var(--warn); }

/* Prompt boxes */
.promptBox {
  background:#0a0f1c; border:1px solid var(--line); border-left:3px solid var(--accent);
  border-radius:8px; padding:12px 14px; margin:8px 0;
  font-family:var(--mono); font-size:12.5px; line-height:1.65; color:var(--text);
  position:relative;
}
.promptBox .copy {
  position:absolute; top:8px; right:8px;
  padding:3px 10px; font-size:10px; border-radius:6px;
  background:var(--panel); border:1px solid var(--line); color:var(--text-mute);
  cursor:pointer; letter-spacing:1.5px; font-weight:800; text-transform:uppercase;
  transition: border-color .12s, color .12s;
  font-family:inherit;
}
.promptBox .copy:hover { border-color:var(--accent); color:var(--accent); }
.promptBox .kicker { display:block; font-size:9px; letter-spacing:1.5px; color:var(--accent); font-weight:800; text-transform:uppercase; margin-bottom:6px; font-family:inherit; }

/* Callout */
.callout { background:var(--panel-2); border-left:4px solid var(--accent); padding:12px 16px; border-radius:8px; margin:10px 0; }
.callout h4 { margin:0 0 4px; color:var(--accent); font-size:12px; }
.callout p { margin:2px 0; font-size:13px; color:var(--text-dim); line-height:1.6; }
.callout.warn { border-left-color:var(--warn); } .callout.warn h4 { color:var(--warn); }
.callout.good { border-left-color:var(--good); } .callout.good h4 { color:var(--good); }
.callout.bad { border-left-color:var(--bad); } .callout.bad h4 { color:var(--bad); }

/* Notes */
.notesBox {
  background:var(--panel-2); border:1.5px dashed var(--line-2); border-radius:12px;
  padding:14px 16px; margin-top:14px;
}
.notesBox textarea {
  width:100%; min-height:80px;
  background:transparent; border:none; color:var(--text); font-family:var(--mono); font-size:13px;
  outline:none; resize:vertical; line-height:1.6;
}
.notesBox .h {
  display:flex; justify-content:space-between; align-items:center; font-size:10px;
  letter-spacing:1.5px; color:var(--text-mute); font-weight:800; text-transform:uppercase; margin-bottom:6px;
}

/* Buttons */
.btn {
  appearance:none; border:1px solid var(--line); background:var(--panel); color:var(--text);
  padding:10px 18px; border-radius:10px; cursor:pointer; font-size:13px; font-weight:700;
  transition:transform .1s var(--easing), border-color .12s, background .15s; font-family:inherit;
}
.btn:hover { border-color:var(--accent); background:var(--accent-soft); }
.btn.primary {
  background:linear-gradient(135deg, var(--accent), var(--purple)); color:#0a0e18; border:none;
  font-weight:800; padding:12px 22px;
  box-shadow:0 10px 26px rgba(124,156,255,.28);
}
.btn.primary:hover { transform:translateY(-1px); }
.btn.compact { padding:5px 10px; font-size:11px; }

.actionBar { display:flex; flex-wrap:wrap; gap:8px; justify-content:flex-end; margin-top:16px; align-items:center; }
.actionBar .leftActions { margin-right:auto; }

.metricRow {
  display:grid; grid-template-columns:1fr auto; gap:10px; align-items:center;
  padding:6px 0; border-bottom:1px dashed var(--line);
}
.metricRow .k { font-size:12px; color:var(--text-mute); font-weight:700; letter-spacing:1.2px; text-transform:uppercase; }
.metricRow .v { font-family:var(--mono); font-weight:800; color:var(--text); font-size:13px; }

/* Bookmark button */
.bookmarkBtn {
  padding:6px 12px; border-radius:8px; background:var(--panel); border:1px solid var(--line);
  color:var(--text-dim); cursor:pointer; font-size:12px; font-weight:700; font-family:inherit;
}
.bookmarkBtn:hover { border-color:var(--warn); color:var(--warn); background:rgba(251,191,36,.08); }
.bookmarkBtn.on { border-color:var(--warn); color:var(--warn); background:rgba(251,191,36,.10); }

/* Toast */
.toast {
  position:fixed; top:20px; right:20px; z-index:100;
  background:var(--panel-2); border:1px solid var(--accent); color:var(--text);
  padding:12px 18px; border-radius:10px; font-size:13px; font-weight:700;
  box-shadow:var(--shadow); animation:toastIn .3s ease-out, toastOut .3s ease-in 2.2s forwards;
}
.toast.good { border-color:var(--good); color:var(--good); }
.toast.bad { border-color:var(--bad); color:var(--bad); }
@keyframes toastIn { from{opacity:0;transform:translateX(20px);} to{opacity:1;transform:translateX(0);} }
@keyframes toastOut { to{opacity:0;transform:translateX(20px);} }

.footer { color:var(--text-mute); font-size:11px; text-align:center; margin-top:22px; letter-spacing:1px; line-height:1.6; }

.hero {
  text-align:center; padding:24px 20px;
}
.hero .titleBig {
  font-size:44px; font-weight:900; letter-spacing:-1.2px; line-height:1.1;
  background:linear-gradient(135deg, #fff, var(--accent-2), var(--purple));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.hero .tagBig { color:var(--text-dim); font-size:15px; margin:14px auto 0; max-width:640px; line-height:1.7; }
.factGrid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin:22px 0 8px; text-align:center; }
@media(max-width:720px){ .factGrid { grid-template-columns:repeat(2,1fr); } }
.factTile { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
.factTile .k { font-size:10px; color:var(--text-mute); letter-spacing:2px; font-weight:800; text-transform:uppercase; }
.factTile .v { font-family:var(--mono); font-size:22px; color:var(--accent); font-weight:800; margin-top:4px; }

@media (prefers-reduced-motion: reduce) { * { animation:none!important; transition:none!important; } }

@media print {
  header, .stageStrip, .progressBar, .actionBar, .footer, .iconBtn, .btn, .bookmarkBtn { display:none!important; }
  .card { box-shadow:none; page-break-inside:avoid; break-inside:avoid; }
  body { background:#fff; color:#000; }
}
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="logo">🧭</div>
      <div>
        <h1>AI Workflow Architect</h1>
        <div class="sub">Day 43 · #60DayClaudeChallenge · Data Analysis</div>
      </div>
    </div>
    <div class="headActions">
      <div class="hud">Progress <b id="hudProgress">0/7</b></div>
      <div class="hud">Bookmarks <b id="hudBookmarks">0</b></div>
      <button class="iconBtn" id="printBtn">🖨️ Print</button>
      <button class="iconBtn" id="resetBtn">↻ Reset</button>
      <button class="iconBtn" id="themeBtn">🌙 Dark</button>
    </div>
  </header>

  <div class="progressBar"><i id="progressBar" style="width:0%"></i></div>

  <div class="stageStrip" id="stageStrip"></div>

  <div id="stage"></div>

  <p class="footer">
    Complete end-to-end workflow · Data Analysis (Question to Dashboard) · 7 stages · Progress saved in your browser<br/>
    Single HTML file · Vanilla CSS + JS · Built for Day 43 of #60DayClaudeChallenge
  </p>
</div>

<script>
/* =============================================================
   AI WORKFLOW ARCHITECT — Day 43
   Workflow: Data Analysis · Question to Dashboard
   ============================================================= */

const STAGES = [
  {
    id:"clarify", num:"01", icon:"❓",
    name:"Clarify the Question",
    kicker:"FROM VAGUE ASK TO PRECISE HYPOTHESIS",
    objectives:"Turn a stakeholder request into a specific, measurable question that has a decision attached.",
    tasks:[
      "Get the stakeholder to name the decision the answer will inform.",
      "Restate the ask in your own words and get confirmation.",
      "Convert 'why is X happening?' into 'is X caused by A, B, or C?'",
      "Name the metric that will resolve the question in one sentence.",
      "Time-box: agree on when the answer is needed and how deep the analysis should go.",
    ],
    tools:[
      { name:"Claude / ChatGPT", icon:"🤖", why:"Best for reframing vague stakeholder asks into precise questions. Ask it to challenge your problem statement.", alt:"Notion AI, Perplexity", tier:"free" },
      { name:"Notion", icon:"📓", why:"Docs for capturing the brief, decision context, and open questions in one linkable place.", alt:"Google Docs, Coda", tier:"free" },
      { name:"Loom", icon:"🎥", why:"When a stakeholder can't write a clean brief, ask for a 3-min Loom describing what they need.", alt:"Vimeo, YouTube unlisted", tier:"free" },
    ],
    prompts:[
      { kicker:"Reframe a vague ask", text:"I received this request from a stakeholder: [paste]. Rewrite it as 3 candidate hypotheses. For each, name (a) the metric that would resolve it, (b) the data I would need, and (c) the decision the answer would inform." },
      { kicker:"Pressure-test scope", text:"Given this analysis question: [paste], what are 3 ways I could scope it too narrowly and 3 ways I could scope it too broadly? Recommend the middle option and explain why." },
    ],
    best_practices:[
      "Every analysis needs a named decision. If nobody can name one, it's a research project, not analysis.",
      "Write the one-sentence answer BEFORE the analysis. If the answer template doesn't fit any real value, the question is wrong.",
      "Agree on a definition of every metric BEFORE you write SQL. 'Active user' means 5 different things.",
      "Push back on 'show me everything.' Force a specific first question with a clear next question ready.",
    ],
    mistakes:[
      "Starting to write SQL before restating the question — you'll deliver an answer to a different question.",
      "Accepting 'we want a dashboard' as the scope. A dashboard is an output format, not a question.",
      "Assuming your definition of a metric matches the stakeholder's. It rarely does.",
      "Committing to a deadline before knowing what data actually exists.",
    ],
    expected_outputs:"A one-page brief with: the decision, the specific question, the metric, the deadline, and 3 questions you couldn't answer with the current information.",
    time_est:"30-90 minutes (do NOT skip)",
    efficiency:[
      "Keep a template for briefs — same fields every time reduces cognitive load.",
      "Have a 15-min stakeholder call before the analysis starts. It saves days later.",
      "If the stakeholder can't articulate the decision, ask 'what would you do differently if the answer was A vs B?'",
    ],
  },
  {
    id:"design", num:"02", icon:"🗺️",
    name:"Design the Analysis",
    kicker:"METHODOLOGY BEFORE QUERIES",
    objectives:"Plan the entire analysis on paper before writing a line of SQL — data sources, methodology, hypothesis, and success criteria.",
    tasks:[
      "List every data source needed. Confirm access, freshness, and known quality issues.",
      "Write the exact definition of every metric in the analysis.",
      "Pick a methodology: descriptive stats, cohort analysis, regression, A/B test, or funnel.",
      "Draft the analysis plan as a numbered list of steps, each with an intermediate output.",
      "Pre-register your hypothesis: what result would surprise you, and what would confirm your intuition.",
    ],
    tools:[
      { name:"Claude", icon:"🤖", why:"Excellent for stress-testing your analysis plan. Paste your plan and ask it to name what you missed.", alt:"ChatGPT, Gemini", tier:"free" },
      { name:"Miro / FigJam", icon:"🎨", why:"Diagram the data flow, joins, and downstream computation before writing any SQL.", alt:"Excalidraw, Lucid", tier:"free" },
      { name:"dbdiagram.io", icon:"📐", why:"Draw the exact schema and joins you need. Catches missing keys early.", alt:"dbdocs, drawSQL", tier:"free" },
    ],
    prompts:[
      { kicker:"Pressure-test the plan", text:"Here is my analysis plan: [paste]. What are 5 things I might have missed? What are 3 assumptions that would invalidate the plan if wrong? What's a simpler version of this that still answers the question?" },
      { kicker:"Pick a methodology", text:"I want to understand [question]. Given I have [data available], recommend the most appropriate methodology (regression, cohort, A/B, funnel, descriptive). Justify why, and name what could go wrong with each alternative." },
    ],
    best_practices:[
      "Design for the answer, not the data. Start from the decision, work backward to what data resolves it.",
      "The methodology decides the confidence you can claim. Descriptive stats = trends. Regression = drivers. Experiment = causation.",
      "Write down the assumption you're most uncertain about. Test it first.",
      "Always draft the final chart or table BEFORE running the query.",
    ],
    mistakes:[
      "Jumping to SQL because 'we know what we need.' Half the time we don't.",
      "Using regression when the data can't support causal claims. Correlation != causation.",
      "Skipping the schema check. 'Users' means different things in prod vs analytics warehouse.",
      "Not pre-registering the hypothesis — you'll rationalize whatever you find.",
    ],
    expected_outputs:"A written analysis plan: methodology, data sources, join keys, metric definitions, expected output shape, and 2-3 assumptions to validate first.",
    time_est:"1-2 hours",
    efficiency:[
      "Keep a snippet library of your team's canonical metric definitions.",
      "Draw the final chart in your notebook FIRST as a placeholder. It clarifies the SQL.",
      "For unfamiliar datasets, spend 15 minutes exploring the schema with SELECT * LIMIT 100 before writing the real query.",
    ],
  },
  {
    id:"extract", num:"03", icon:"⛏️",
    name:"Extract & Clean Data",
    kicker:"THE MOST TIME-CONSUMING STAGE",
    objectives:"Pull the right rows and columns, join them cleanly, handle nulls and outliers, and produce an analysis-ready table.",
    tasks:[
      "Write the SQL from the design doc. Aim for one CTE per intermediate step.",
      "Validate row counts at every join. Row explosions are the #1 silent bug.",
      "Handle nulls explicitly. Every null is either 'unknown' or 'zero' — decide which.",
      "Detect and document outliers. Don't silently drop them.",
      "Add data quality checks: distinct counts, min/max, sanity totals.",
    ],
    tools:[
      { name:"Cursor", icon:"⚡", why:"AI-native code editor. Autocomplete for SQL that's actually correct against your schema.", alt:"VS Code + Copilot", tier:"paid" },

/* ============================================================
   STATE (localStorage persisted)
   ============================================================ */
const KEY = "awa.state";
let state = load();
function load() {
  try {
    const s = localStorage.getItem(KEY);
    if (s) return JSON.parse(s);
  } catch {}
  return { current:"welcome", done:{}, bookmarks:{}, notes:{} };
}
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {} }

const el = (id) => document.getElementById(id);
function esc(s){ return String(s||"").replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg, kind="") { const t=document.createElement("div"); t.className="toast"+(kind?" "+kind:""); t.textContent=msg; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

/* Copy handler */
window.copyText = function(btn) {
  const text = btn.parentElement.innerText.replace(/^Copy\s*/, "").trim();
  navigator.clipboard.writeText(text).then(() => { btn.textContent = "✓ Copied"; setTimeout(() => btn.textContent = "Copy", 1400); });
};

/* ============================================================
   RENDER
   ============================================================ */
function renderStrip() {
  const strip = el("stageStrip");
  const rowChildren = STAGES.map((s, i) => {
    const isActive = state.current === s.id;
    const isDone = state.done[s.id];
    let cls = "stageChip";
    if (isActive) cls += " active";
    if (isDone) cls += " done";
    return `
      <div class="${cls}" data-id="${s.id}">
        <div class="n">STAGE ${s.num}</div>
        <div class="icon">${s.icon}</div>
        <div class="lbl">${esc(s.name)}</div>
      </div>
      ${i < STAGES.length - 1 ? '<span class="arrow">→</span>' : ""}
    `;
  }).join("");
  strip.innerHTML = `<div class="row">${rowChildren}</div>`;
  strip.querySelectorAll(".stageChip").forEach(c => c.addEventListener("click", () => goto(c.dataset.id)));

  // HUD + progress bar
  const doneCount = STAGES.filter(s => state.done[s.id]).length;
  el("hudProgress").textContent = doneCount + "/7";
  el("hudBookmarks").textContent = Object.keys(state.bookmarks).length;
  el("progressBar").style.width = (doneCount / 7 * 100) + "%";
}

function goto(next) {
  state.current = next;
  save();
  renderStrip();
  if (next === "welcome") renderWelcome();
  else if (next === "resources") renderResources();
  else renderStage(next);
  window.scrollTo({ top:0, behavior:window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth" });
}

function renderStage(id) {
  const s = STAGES.find(x => x.id === id);

  const notes = state.notes[id] || "";
  const isDone = state.done[id];
  const idx = STAGES.findIndex(x => x.id === id);
  const prev = idx > 0 ? STAGES[idx - 1] : null;
  const next = idx < STAGES.length - 1 ? STAGES[idx + 1] : null;

  el("stage").innerHTML = `
    <div class="card">
      <div class="stageHead">
        <div>
          <div class="k">STAGE ${s.num} · ${s.kicker}</div>
          <h3><span style="margin-right:8px;">${s.icon}</span>${esc(s.name)}</h3>
        </div>
        <div style="display:flex; gap:8px; flex-wrap:wrap; align-items:center;">
          <span class="tag time">⏱ ${esc(s.time_est)}</span>
          <button class="bookmarkBtn ${isBookmarked ? "on" : ""}" id="bmBtn">${isBookmarked ? "★ Bookmarked" : "☆ Bookmark"}</button>
        </div>
      </div>

      <div class="objStrip">
        <h4>OBJECTIVE</h4>
        <p>${esc(s.objectives)}</p>
      </div>

      <h3>Tasks</h3>
      <ol>${s.tasks.map(t => `<li>${esc(t)}</li>`).join("")}</ol>

      <h3>Best AI Tools for This Stage</h3>
      <div class="toolGrid">
        ${s.tools.map(t => `
          <div class="toolCard">
            <div class="top">
              <span class="icon">${t.icon}</span>
              <span class="name">${esc(t.name)}</span>
              <span class="badge ${t.tier === "free" ? "free" : "paid"}">${t.tier === "free" ? "Free tier" : "Paid"}</span>
            </div>
            <div class="why">${esc(t.why)}</div>
            <div class="alt">Alternatives: ${esc(t.alt)}</div>
          </div>
        `).join("")}
      </div>

      <h3>Prompt Examples</h3>
      ${s.prompts.map(p => `
        <div class="promptBox">
          <button class="copy" onclick="copyText(this)">Copy</button>
          <span class="kicker">${esc(p.kicker)}</span>
          ${esc(p.text)}
        </div>
      `).join("")}

      <div class="two-col">
        <div class="subCard">
          <h4>✅ Best Practices</h4>
          <ul>${s.best_practices.map(b => `<li>${esc(b)}</li>`).join("")}</ul>
        </div>
        <div class="subCard">
          <h4>⚠️ Common Mistakes</h4>
          <ul>${s.mistakes.map(m => `<li>${esc(m)}</li>`).join("")}</ul>
        </div>
      </div>

      <div class="callout good">
        <h4>EXPECTED OUTPUTS</h4>
        <p>${esc(s.expected_outputs)}</p>
      </div>

      <h3>Efficiency Tips</h3>
      <ul>${s.efficiency.map(t => `<li>${esc(t)}</li>`).join("")}</ul>

      <div class="notesBox">
        <div class="h">
          <span>Your Notes for This Stage</span>
          <span class="mono" style="font-size:10px;" id="notesSaved">Auto-saved</span>
        </div>
        <textarea id="notesArea" placeholder="Paste stakeholder briefs, capture questions, jot findings...">${esc(notes)}</textarea>
      </div>

      <div class="actionBar">
        <button class="btn leftActions" id="prevBtn" ${!prev ? "disabled" : ""}>${prev ? "← " + prev.name : "← Overview"}</button>
        <button class="btn" id="doneBtn">${isDone ? "✓ Marked Complete" : "Mark Complete"}</button>
        <button class="btn primary" id="nextBtn">${next ? next.name + " →" : "Continue to Resources →"}</button>
      </div>
    </div>
  `;

  el("bmBtn").addEventListener("click", () => {
    if (state.bookmarks[id]) delete state.bookmarks[id];
    else state.bookmarks[id] = true;
    save();
    renderStrip();
    renderStage(id);
    toast(state.bookmarks[id] ? "Bookmarked" : "Removed bookmark");
  });

  el("prevBtn").addEventListener("click", () => goto(prev ? prev.id : "welcome"));
  el("nextBtn").addEventListener("click", () => {
    state.done[id] = true;
    save();
    goto(next ? next.id : "resources");
  });
  el("doneBtn").addEventListener("click", () => {
    state.done[id] = !state.done[id];
    save();
    renderStrip();
    renderStage(id);
    toast(state.done[id] ? "Stage marked complete" : "Stage marked incomplete", "good");
  });

  const notesArea = el("notesArea");
  let saveTimer;
  notesArea.addEventListener("input", () => {
    state.notes[id] = notesArea.value;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => { save(); el("notesSaved").textContent = "✓ Saved"; setTimeout(() => el("notesSaved").textContent = "Auto-saved", 1500); }, 400);
  });
}

            <div class="mono" style="font-size:11px; color:var(--accent); font-weight:800; margin-top:4px;">⏱ ${esc(s.time_est)}</div>
          </div>
        `).join("")}
      </div>

      <h3>Recommended AI Stack</h3>
      <div class="two-col">
        <div class="subCard">
          <h4>🧠 THINKING PARTNER</h4>
          <p><b>Claude</b> — for reframing questions, stress-testing analysis plans, sharpening insights. Best writing collaborator.</p>
          <p><b>ChatGPT / Gemini</b> — alternatives when Claude is unavailable. Similar capability, different voice.</p>
        </div>
        <div class="subCard">
          <h4>⚡ CODE + SQL</h4>
          <p><b>Cursor</b> — AI-native editor. Best autocomplete for schema-aware SQL and Python.</p>
          <p><b>Hex / Deepnote</b> — notebooks with built-in AI. Modern analyst standard.</p>
        </div>
        <div class="subCard">
          <h4>📊 ANALYSIS</h4>
          <p><b>Julius AI / Chat2CSV</b> — natural language over CSV. Great for exploration.</p>
          <p><b>Python + pandas + statsmodels</b> — the durable stack every analyst should know.</p>
        </div>
        <div class="subCard">
          <h4>🏗️ DELIVERABLES</h4>
          <p><b>Tableau / Power BI Copilot</b> — enterprise dashboards with AI assistance.</p>
          <p><b>Gamma / Tome</b> — AI-generated first-draft slide decks. Big time-saver.</p>
        </div>
      </div>

      <h3>Learning Resources</h3>
      <div class="two-col">
        <div class="subCard">
          <h4>📚 BOOKS</h4>
          <p><b>Storytelling with Data</b> (Cole Nussbaumer Knaflic) — the canonical book on chart design and analyst communication.</p>
          <p><b>The Art of Statistics</b> (David Spiegelhalter) — practical statistical thinking for real problems.</p>
          <p><b>Ace the Data Science Interview</b> — problem-first practice for analytics/DS interviews.</p>
        </div>
        <div class="subCard">
          <h4>🌐 DOCUMENTATION</h4>
          <p><b>Mode's SQL Tutorial</b> — the best free SQL primer with analyst-shaped problems.</p>
          <p><b>Hex Templates</b> — production-ready notebook templates for common analyses.</p>
          <p><b>dbt Learn</b> — the modern data modeling standard, worth learning if you touch a warehouse.</p>
        </div>
      </div>

      <h3>Communities</h3>
      <div class="two-col">
        <div class="subCard">
          <h4>💬 WHERE ANALYSTS HANG OUT</h4>
          <p><b>Locally Optimistic Slack</b> — where analytics engineering conversations happen.</p>
          <p><b>DataTalks.Club</b> — free courses + community for data careers.</p>
          <p><b>r/analytics</b> — Reddit thread with real analyst career discussions.</p>
        </div>
        <div class="subCard">
          <h4>📰 NEWSLETTERS / BLOGS</h4>
          <p><b>Benn.substack.com</b> — the sharpest ongoing writing about analytics as a discipline.</p>
          <p><b>SeattleDataGuy</b> — modern data stack + career advice.</p>
          <p><b>Cassie Kozyrkov's Making Better Decisions</b> — statistical thinking for practitioners.</p>
        </div>
      </div>

      <h3>Search Keywords</h3>
      <div class="callout">
        <p>When stuck, search: <code>sql window function running total</code>, <code>simpson's paradox example</code>, <code>a/b test sample size calculator</code>, <code>funnel analysis pandas</code>, <code>cohort retention chart</code>, <code>bootstrap confidence interval</code>, <code>dashboard best practices</code>.</p>
      </div>

      <h3>Additional AI Prompts for Ongoing Practice</h3>
      <div class="promptBox">
        <button class="copy" onclick="copyText(this)">Copy</button>
        <span class="kicker">Analysis critique</span>
Review this analysis end-to-end: [paste]. What's the weakest part of the argument? What would a skeptical stakeholder push back on? What additional data would resolve the biggest uncertainty?
      </div>
      <div class="promptBox">
        <button class="copy" onclick="copyText(this)">Copy</button>
        <span class="kicker">Data quality check</span>
Given this data sample: [paste 20 rows]. What data quality issues are visible? Are there patterns that suggest a broken pipeline vs. actual variation in the underlying process?
      </div>
      <div class="promptBox">
        <button class="copy" onclick="copyText(this)">Copy</button>
        <span class="kicker">Metric definition</span>
I need to define [metric] for [context]. Here's my current definition: [paste]. What are 3 edge cases my definition doesn't handle? How would you tighten this?
      </div>

      <h3>Future Automation Opportunities</h3>
      <div class="two-col">
        <div class="subCard">
          <h4>🤖 AUTOMATE THE REPETITIVE</h4>
          <p><b>Recurring analyses</b> — turn one-off analyses into scheduled dashboards or dbt models. Every re-request is a signal to automate.</p>
          <p><b>Data quality alerts</b> — Great Expectations or Soda for automated checks that catch broken pipelines before the analysis does.</p>
          <p><b>Metric layer</b> — dbt Metrics or Cube.dev so metric definitions live in one place, not scattered across 20 dashboards.</p>
        </div>
        <div class="subCard">
          <h4>🚀 ELEVATE THE JUDGMENT-HEAVY</h4>
          <p><b>Self-serve exploration</b> — Julius AI or Chat2CSV lets non-analysts answer their own follow-ups. You move up the value chain.</p>
          <p><b>Anomaly detection</b> — replace manual monitoring with Anodot or Sisu for the "wait, is this normal?" checks.</p>
          <p><b>Stakeholder-facing docs</b> — Notion AI to keep the "what does this metric mean?" doc updated automatically as definitions evolve.</p>
        </div>
      </div>

      <div class="callout">
        <h4>Remember</h4>
        <p>The stages don't disappear when you use AI — they just get faster. Clarifying the question, choosing a methodology, and defending the finding are still the analyst's job. AI is the co-pilot, not the pilot.</p>
      </div>

      <div class="actionBar">
        <button class="btn" onclick="window.print()">🖨️ Print Full Workflow</button>
        <button class="btn primary leftActions" onclick="goto('welcome')">← Back to Overview</button>
      </div>
    </div>
  `;
}

/* ============================================================
   THEME / PRINT / RESET
   ============================================================ */
el("themeBtn").addEventListener("click", () => {
  const isLight = document.body.classList.toggle("lightMode");
  el("themeBtn").textContent = isLight ? "☀️ Light" : "🌙 Dark";
});
el("printBtn").addEventListener("click", () => window.print());
el("resetBtn").addEventListener("click", () => {
  if (!confirm("Reset all progress, notes, and bookmarks?")) return;
  state = { current:"welcome", done:{}, bookmarks:{}, notes:{} };
  save();
  goto("welcome");
  toast("Reset complete", "good");
});

/* Init */
renderStrip();
if (state.current === "welcome") renderWelcome();
else if (state.current === "resources") renderResources();
else if (STAGES.find(s => s.id === state.current)) renderStage(state.current);
else renderWelcome();
</script>
