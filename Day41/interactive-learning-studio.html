<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>🎓 Interactive Learning Studio — SQL Window Functions · Day 41</title>
<style>
/* =============================================================
   INTERACTIVE LEARNING STUDIO — Day 41
   Topic: SQL Window Functions
   Single HTML file · Vanilla CSS + JS · No frameworks
   ============================================================= */

:root {
  --bg:        #0b1220;
  --bg-2:      #0f1729;
  --panel:     #141c30;
  --panel-2:   #1c2540;
  --line:      #263148;
  --line-2:    #364260;
  --text:      #e2e8f0;
  --text-dim:  #b4c0d4;
  --text-mute: #7c8aa5;

  --accent:    #38bdf8;
  --accent-2:  #7dd3fc;
  --accent-soft: rgba(56,189,248,.16);

  --good:      #4ade80;
  --bad:       #f56565;
  --warn:      #fbbf24;
  --gold:      #ffd166;
  --purple:    #a687ff;
  --pink:      #ff7bb5;

  --shadow:    0 20px 60px rgba(0,0,0,.55);
  --radius:    14px;
  --easing:    cubic-bezier(.2,.8,.2,1);
  --mono:      "JetBrains Mono", "Fira Code", ui-monospace, Menlo, monospace;
}

body.lightMode {
  --bg:#f6f8fb; --bg-2:#fff; --panel:#fff; --panel-2:#f0f4fa;
  --line:#e2e8f0; --line-2:#cbd5e1;
  --text:#0f172a; --text-dim:#475569; --text-mute:#94a3b8;
  --shadow: 0 12px 40px rgba(15,23,42,.08);
}

* { box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html, body {
  margin:0; padding:0; min-height:100%;
  background:
    radial-gradient(1000px 700px at 10% -10%, var(--accent-soft), transparent 60%),
    radial-gradient(800px 500px at 100% 100%, rgba(166,135,255,.08), transparent 60%),
    var(--bg);
  color:var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Inter, system-ui, sans-serif;
  -webkit-font-smoothing:antialiased;
  line-height:1.6;
}
.mono { font-family: var(--mono); }
.app { max-width:1180px; margin:0 auto; padding:22px 24px 60px; }

/* ========== HEADER ========== */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:10px 0 16px; margin-bottom:16px; flex-wrap:wrap; gap:12px;
  border-bottom:1px solid var(--line);
}
.brand { display:flex; align-items:center; gap:14px; }
.logo {
  width:52px; height:52px; border-radius:14px;
  background:linear-gradient(135deg, var(--accent), var(--purple));
  display:flex; align-items:center; justify-content:center; font-size:26px;
  box-shadow: 0 12px 30px rgba(0,0,0,.4);
}
.brand h1 { margin:0; font-size:22px; font-weight:800; letter-spacing:-.3px; }
.brand .sub { font-size:11px; color:var(--text-mute); letter-spacing:2px; text-transform:uppercase; font-weight:700; }

.headActions { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.hud {
  padding:6px 12px; border-radius:999px; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
  font-weight:800; background:var(--panel); border:1px solid var(--line); color:var(--text-dim);
}
.hud.gold { border-color:var(--gold); color:var(--gold); background:rgba(255,209,102,.08); }
.hud b { color:var(--text); font-family:var(--mono); }
.iconBtn {
  background:var(--panel); border:1px solid var(--line);
  color:var(--text-dim); padding:8px 14px; border-radius:10px; cursor:pointer;
  font-size:13px; font-weight:700;
  transition:border-color .12s, background .15s, color .12s;
}
.iconBtn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-soft); }

/* ========== PROGRESS ========== */
.progressBar { height:6px; background:var(--panel-2); border-radius:3px; overflow:hidden; margin-bottom:20px; }
.progressBar i { display:block; height:100%; background: linear-gradient(90deg, var(--accent), var(--purple)); transition: width .6s var(--easing); border-radius:3px; }

/* ========== SIDEBAR TAB NAV ========== */
.tabRow {
  display:flex; gap:6px; background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:5px; margin-bottom:18px; overflow-x:auto;
}
.tab {
  flex:1; min-width:130px; padding:10px 14px; border:none; background:transparent; color:var(--text-dim); cursor:pointer;
  border-radius:8px; font-size:12.5px; font-weight:700; letter-spacing:.3px;
  transition:background .15s, color .12s;
  font-family:inherit;
  display:flex; align-items:center; gap:6px; justify-content:center;
  white-space:nowrap;
}
.tab:hover { color:var(--text); background:var(--panel-2); }
.tab.active { background:linear-gradient(135deg, var(--accent), var(--purple)); color:#0a0e18; font-weight:800; }
.tab.locked { opacity:.45; cursor:not-allowed; }
.tab .num { display:inline-flex; align-items:center; justify-content:center; width:20px; height:20px; border-radius:50%; background:rgba(255,255,255,.1); font-size:10px; font-weight:900; }
.tab.active .num { background:rgba(0,0,0,.15); }
.tab.done .num { background:var(--good); color:#0a0e18; }
.tab.done .num::before { content:"✓"; }
.tab.done .num > * { display:none; }

/* ========== CARDS ========== */
.card {
  background:linear-gradient(180deg, var(--panel), var(--bg-2));
  border:1px solid var(--line); border-radius:var(--radius);
  padding:26px 30px; box-shadow:var(--shadow); margin-bottom:16px;
  animation: fadeIn .3s var(--easing) both;
}
@keyframes fadeIn { from { opacity:0; transform:translateY(6px);} to { opacity:1; transform:translateY(0);} }

.card h2 { margin:0 0 8px; font-size:26px; font-weight:800; letter-spacing:-.4px; }
.card h3 { margin:24px 0 10px; font-size:20px; font-weight:800; letter-spacing:-.2px; color:var(--text); }
.card h4 { margin:18px 0 6px; font-size:14px; font-weight:800; letter-spacing:1.2px; text-transform:uppercase; color:var(--accent); }
.card p { color:var(--text-dim); font-size:15px; line-height:1.75; margin:8px 0; }
.card p b, .card p strong { color:var(--text); font-weight:800; }
.card ul, .card ol { color:var(--text-dim); font-size:15px; line-height:1.75; padding-left:22px; margin:8px 0; }
.card ul li, .card ol li { margin:4px 0; }
.card ul li::marker { color:var(--accent); }
.card code {
  font-family:var(--mono); background:var(--panel-2); border:1px solid var(--line);
  padding:1px 6px; border-radius:5px; font-size:13px; color:var(--accent);
}

.tag { display:inline-block; font-size:10px; padding:3px 10px; border-radius:999px; background:var(--accent-soft); color:var(--accent); border:1px solid var(--accent); font-weight:800; letter-spacing:1.5px; }

/* ========== WELCOME CARD ========== */
.welcome { text-align:center; padding:26px 20px; }
.welcome .title-big {
  font-size:44px; font-weight:900; letter-spacing:-1.2px; line-height:1.1;
  background: linear-gradient(135deg, #fff, var(--accent-2), var(--purple));
  -webkit-background-clip:text; background-clip:text; color:transparent;
}
.welcome .tag-big { color:var(--text-dim); font-size:16px; margin:12px auto 0; max-width:620px; line-height:1.7; }
.factGrid { display:grid; grid-template-columns:repeat(4, 1fr); gap:12px; margin:20px 0 8px; text-align:center; }
@media(max-width:720px){ .factGrid { grid-template-columns:repeat(2, 1fr); } }
.factTile { background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; }
.factTile .k { font-size:10px; color:var(--text-mute); letter-spacing:2px; font-weight:800; text-transform:uppercase; }
.factTile .v { font-family:var(--mono); font-size:22px; color:var(--accent); font-weight:800; margin-top:4px; }

.checkList { text-align:left; max-width:520px; margin:22px auto 0; }
.checkList li { list-style:none; padding:8px 0 8px 30px; position:relative; color:var(--text-dim); font-size:14px; }
.checkList li::before {
  content:"✓"; position:absolute; left:0; top:8px;
  width:20px; height:20px; border-radius:50%;
  background:var(--good); color:#0a0e18; display:flex; align-items:center; justify-content:center;
  font-size:12px; font-weight:900;
}

/* ========== CODE BLOCK / SQL ========== */
.codeBlock {
  background:#0a0f1c; border:1px solid var(--line); border-radius:10px;
  padding:14px 16px; overflow-x:auto;
  font-family:var(--mono); font-size:13.5px; line-height:1.7;
  color:var(--text); margin:12px 0;
  white-space:pre;
  position:relative;
}
.codeBlock .copy {
  position:absolute; top:8px; right:8px;
  padding:4px 10px; font-size:10px; border-radius:6px;
  background:var(--panel); border:1px solid var(--line); color:var(--text-mute);
  cursor:pointer; letter-spacing:1.5px; font-weight:800; text-transform:uppercase;
  transition: border-color .12s, color .12s;
  font-family:inherit;
}
.codeBlock .copy:hover { border-color:var(--accent); color:var(--accent); }
.sqlKw { color:#f472b6; font-weight:700; }
.sqlFn { color:#38bdf8; }
.sqlStr { color:#4ade80; }
.sqlNum { color:#fbbf24; }
.sqlCom { color:var(--text-mute); font-style:italic; }

/* ========== DATA TABLE ========== */
.dtWrap { overflow-x:auto; margin:12px 0; }
.dt {
  width:100%; border-collapse:collapse; font-family:var(--mono); font-size:13px;
  background:var(--panel-2); border-radius:10px; overflow:hidden;
  border:1px solid var(--line);
}
.dt th, .dt td { text-align:left; padding:8px 12px; border-bottom:1px solid var(--line); }
.dt th { background:#0a0f1c; color:var(--accent); font-weight:800; font-size:11px; letter-spacing:1.5px; text-transform:uppercase; }
.dt tr:last-child td { border-bottom:none; }
.dt tr.highlight { background: var(--accent-soft); }
.dt tr.partitionA { background: rgba(167, 139, 250, 0.09); }
.dt tr.partitionB { background: rgba(74, 222, 128, 0.09); }
.dt tr.partitionC { background: rgba(251, 191, 36, 0.09); }
.dt td.newCol { background: var(--accent-soft); color: var(--accent); font-weight:800; }

/* ========== CALLOUT ========== */
.callout {
  background:var(--panel-2); border-left:4px solid var(--accent);
  padding:14px 18px; border-radius:8px; margin:14px 0;
}
.callout h4 { margin:0 0 6px; color:var(--accent); }
.callout p { margin:4px 0; color:var(--text-dim); font-size:14px; }
.callout.warn { border-left-color:var(--warn); }
.callout.warn h4 { color:var(--warn); }
.callout.good { border-left-color:var(--good); }
.callout.good h4 { color:var(--good); }
.callout.bad { border-left-color:var(--bad); }
.callout.bad h4 { color:var(--bad); }

/* ========== COMPARISON GRID ========== */
.compareGrid { display:grid; grid-template-columns:1fr 1fr; gap:14px; margin:14px 0; }
@media(max-width:700px){ .compareGrid { grid-template-columns:1fr; } }
.compareTile {
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:14px 16px;
}
.compareTile h5 { margin:0 0 8px; font-size:11px; letter-spacing:2px; color:var(--accent); font-weight:800; text-transform:uppercase; }
.compareTile.wrong { border-color:var(--bad); }
.compareTile.wrong h5 { color:var(--bad); }
.compareTile.right { border-color:var(--good); }
.compareTile.right h5 { color:var(--good); }

/* ========== QUIZ ========== */
.quizGrid { display:grid; gap:10px; margin-top:14px; }
.quizChoice {
  background:var(--panel-2); border:1.5px solid var(--line); border-radius:10px;
  padding:12px 14px; cursor:pointer; text-align:left;
  transition:border-color .12s, background .15s;
  font-family:inherit; color:var(--text); font-size:14px; font-weight:600;
  display:flex; align-items:flex-start; gap:10px;
}
.quizChoice:hover { border-color:var(--accent); background:var(--accent-soft); }
.quizChoice .letter {
  width:26px; height:26px; border-radius:50%; background:var(--panel);
  display:flex; align-items:center; justify-content:center;
  font-weight:900; font-size:12px; flex-shrink:0; color:var(--text-dim);
  border:1px solid var(--line);
}
.quizChoice.selected { border-color:var(--accent); background:var(--accent-soft); }
.quizChoice.selected .letter { background:var(--accent); color:#0a0e18; }
.quizChoice.correct { border-color:var(--good); background:rgba(74,222,128,.10); }
.quizChoice.correct .letter { background:var(--good); color:#0a0e18; }
.quizChoice.wrong { border-color:var(--bad); background:rgba(245,101,101,.10); }
.quizChoice.wrong .letter { background:var(--bad); color:#0a0e18; }

.quizExplain {
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px;
  padding:12px 16px; margin-top:10px; font-size:13.5px; line-height:1.65;
  color:var(--text-dim);
}
.quizExplain b { color:var(--text); }
.quizExplain.correct { border-left:4px solid var(--good); }
.quizExplain.wrong   { border-left:4px solid var(--bad); }

/* ========== BUTTONS ========== */
.btn {
  appearance:none; border:1px solid var(--line);
  background:var(--panel); color:var(--text); font-weight:700;
  padding:12px 22px; border-radius:10px; cursor:pointer;
  font-size:13.5px; letter-spacing:.3px;
  transition:transform .1s var(--easing), border-color .12s, background .15s;
  font-family:inherit;
}
.btn:hover { border-color:var(--accent); background:var(--accent-soft); }
.btn:active { transform:translateY(1px); }
.btn.primary {
  background:linear-gradient(135deg, var(--accent), var(--purple));
  color:#0a0e18; border:none; font-weight:800; padding:14px 26px;
  box-shadow:0 12px 30px rgba(56,189,248,.28);
}
.btn.primary:hover { transform:translateY(-1px); color:#0a0e18; }
.btn:disabled { opacity:.45; cursor:not-allowed; }
.btn.compact { padding:6px 14px; font-size:12px; }

.actionBar { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-end; margin-top:20px; align-items:center; }
.actionBar .leftActions { margin-right:auto; }

/* ========== SVG DIAGRAM CONTAINER ========== */
.diagram { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:16px; margin:12px 0; text-align:center; }
.diagram svg { max-width:100%; height:auto; }

/* ========== SCORE SUMMARY ========== */
.scoreCard {
  background: radial-gradient(circle at 50% 30%, var(--accent-soft), transparent 60%), var(--panel-2);
  border:1px solid var(--accent); border-radius:12px;
  padding:22px; text-align:center; margin-top:14px;
}
.scoreCard .lbl { font-size:11px; color:var(--text-mute); letter-spacing:2px; font-weight:800; text-transform:uppercase; }
.scoreCard .val { font-family:var(--mono); font-size:56px; font-weight:900; margin:6px 0;
  background:linear-gradient(135deg, #fff, var(--accent-2)); -webkit-background-clip:text; background-clip:text; color:transparent; line-height:1; }
.scoreCard .msg { color:var(--text-dim); font-size:14px; }

/* ========== TAKEAWAYS ========== */
.takeaways {
  background:var(--panel-2); border:1px solid var(--line); border-radius:12px; padding:16px 20px; margin-top:14px;
}
.takeaways h4 { margin-top:0; }
.takeaways ul { margin:0; padding-left:22px; }

/* ========== CHEAT SHEET ========== */
.cheatGrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(260px, 1fr)); gap:10px; margin-top:14px; }
.cheatCard { background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:12px 14px; }
.cheatCard h5 { margin:0 0 4px; font-size:12px; color:var(--accent); font-weight:800; letter-spacing:1.2px; text-transform:uppercase; }
.cheatCard code { display:block; margin-top:6px; background:#0a0f1c; padding:8px 10px; border-radius:6px; font-size:12px; color:var(--text); font-family:var(--mono); white-space:pre-wrap; word-break:break-word; }

/* ========== RESOURCES GRID ========== */
.resGrid { display:grid; grid-template-columns:repeat(auto-fill, minmax(240px, 1fr)); gap:12px; margin-top:12px; }
.resTile {
  background:var(--panel-2); border:1px solid var(--line); border-radius:10px; padding:14px 16px;
}
.resTile h5 { margin:0 0 6px; font-size:12px; color:var(--accent); font-weight:800; letter-spacing:1.5px; text-transform:uppercase; }
.resTile p { margin:0; color:var(--text-dim); font-size:13px; line-height:1.6; }

/* ========== TOAST ========== */
.toast {
  position:fixed; top:20px; right:20px; z-index:100;
  background:var(--panel-2); border:1px solid var(--accent);
  color:var(--text); padding:12px 18px; border-radius:10px;
  font-size:13.5px; font-weight:700; box-shadow:var(--shadow);
  animation: toastIn .3s ease-out, toastOut .3s ease-in 2.2s forwards;
}
.toast.good { border-color:var(--good); color:var(--good); }
.toast.bad  { border-color:var(--bad);  color:var(--bad); }
@keyframes toastIn { from { opacity:0; transform:translateX(20px);} to { opacity:1; transform:translateX(0);} }
@keyframes toastOut { to { opacity:0; transform:translateX(20px); } }

.confetti { position:fixed; pointer-events:none; inset:0; overflow:hidden; z-index:80; display:none; }
.confetti.show { display:block; }
.confetti i { position:absolute; top:-10px; width:8px; height:14px; opacity:.9; animation:fall linear forwards; }
@keyframes fall { to { transform:translateY(110vh) rotate(720deg); opacity:.4; } }

.footer { color:var(--text-mute); font-size:11px; text-align:center; margin-top:22px; letter-spacing:1px; line-height:1.6; }

@media (prefers-reduced-motion: reduce) { * { animation:none !important; transition:none !important; } }

@media print {
  header, .tabRow, .progressBar, .actionBar, .footer { display:none !important; }
  .card { box-shadow:none; page-break-inside: avoid; }
  body { background:#fff; color:#000; }
}
</style>
</head>
<body>

<div class="app">

  <!-- ============ HEADER ============ -->
  <header>
    <div class="brand">
      <div class="logo">🎓</div>
      <div>
        <h1>Interactive Learning Studio</h1>
        <div class="sub">Day 41 · #60DayClaudeChallenge</div>
      </div>
    </div>
    <div class="headActions">
      <div class="hud">🎯 XP <b id="hudXp">0</b></div>
      <div class="hud gold">🏆 <b id="hudBadges">0</b>/4</div>
      <button class="iconBtn" id="printBtn" title="Print notes">🖨️ Notes</button>
      <button class="iconBtn" id="themeBtn">🌙 Dark</button>
    </div>
  </header>

  <!-- ============ PROGRESS BAR ============ -->
  <div class="progressBar"><i id="progressBar" style="width:0%"></i></div>

  <!-- ============ TAB NAV ============ -->
  <div class="tabRow" id="tabRow"></div>

  <!-- ============ STAGE ============ -->
  <div id="stage"></div>

  <p class="footer">
    Topic: <b>SQL Window Functions</b> · Standard SQL syntax works in PostgreSQL, MySQL 8+, SQL Server, BigQuery, Snowflake<br/>
    Single HTML file · Vanilla CSS + JS · Built for Day 41 of #60DayClaudeChallenge
  </p>
</div>

<div class="confetti" id="confetti"></div>

<script>
/* =============================================================
   INTERACTIVE LEARNING STUDIO — Day 41 · Logic
   Topic: SQL Window Functions
   ============================================================= */

/* ============================================================
   STATE
   ============================================================ */
const STAGES = [
  { id:"welcome",  label:"Intro",             short:"Intro" },
  { id:"m1",       label:"Module 1 · Basics", short:"M1" },
  { id:"q1",       label:"Quiz 1",            short:"Q1" },
  { id:"m2",       label:"Module 2 · Ranking", short:"M2" },
  { id:"q2",       label:"Quiz 2",            short:"Q2" },
  { id:"m3",       label:"Module 3 · Lead/Lag", short:"M3" },
  { id:"q3",       label:"Quiz 3",            short:"Q3" },
  { id:"m4",       label:"Module 4 · Frames",  short:"M4" },
  { id:"q4",       label:"Quiz 4",            short:"Q4" },
  { id:"challenge",label:"Final Challenge",    short:"Final" },
  { id:"resources",label:"Resources",          short:"Resources" },
];

const state = {
  stage:"welcome",
  xp:0,
  badges:0,
  moduleUnlocked:{ welcome:true, m1:true, q1:false, m2:false, q2:false, m3:false, q3:false, m4:false, q4:false, challenge:false, resources:true },
  quizAnswers:{},
  quizScores:{},
  moduleDone:{}
};

/* Utils */
const el = (id) => document.getElementById(id);
function esc(s){ return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function toast(msg, kind="") {
  const t = document.createElement("div");
  t.className = "toast" + (kind ? " " + kind : "");
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2600);
}
function addXp(n) {
  state.xp += n;
  el("hudXp").textContent = state.xp;
}
function burstConfetti() {
  const c = el("confetti");
  c.innerHTML = "";
  const colors = ["#38bdf8","#a687ff","#4ade80","#ffd166","#ff7bb5"];
  for (let i = 0; i < 80; i++) {
    const p = document.createElement("i");
    p.style.left = Math.random() * 100 + "vw";
    p.style.background = colors[i % colors.length];
    p.style.animationDuration = (1.6 + Math.random() * 1.8) + "s";
    p.style.transform = `rotate(${Math.random()*360}deg)`;
    c.appendChild(p);
  }
  c.classList.add("show");
  setTimeout(() => c.classList.remove("show"), 3500);
}

/* SQL syntax highlighter (minimal) */
function highlightSQL(sql) {
  const KW = /\b(SELECT|FROM|WHERE|GROUP BY|ORDER BY|PARTITION BY|OVER|WINDOW|AS|WITH|OVER\s*\(|BETWEEN|AND|OR|NOT|IN|IS|NULL|CASE|WHEN|THEN|ELSE|END|JOIN|LEFT|RIGHT|INNER|OUTER|ON|LIMIT|OFFSET|UNBOUNDED|PRECEDING|FOLLOWING|CURRENT|ROW|ROWS|RANGE|DISTINCT|HAVING|EXISTS|UNION|INTERSECT|EXCEPT|CREATE|TABLE|VIEW|INSERT|UPDATE|DELETE|VALUES|SET)\b/gi;
  const FN = /\b(ROW_NUMBER|RANK|DENSE_RANK|LEAD|LAG|FIRST_VALUE|LAST_VALUE|NTH_VALUE|NTILE|SUM|AVG|COUNT|MIN|MAX|CUME_DIST|PERCENT_RANK|COALESCE|NULLIF|CAST|EXTRACT)\b/g;
  return esc(sql)
    .replace(/(--[^\n]*)/g, '<span class="sqlCom">$1</span>')
    .replace(/(&#39;[^&]*?&#39;)/g, '<span class="sqlStr">$1</span>')
    .replace(FN, '<span class="sqlFn">$1</span>')
    .replace(KW, '<span class="sqlKw">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="sqlNum">$1</span>');
}
function codeBlock(sql) {
  return `<div class="codeBlock"><button class="copy" onclick="copyCode(this)">Copy</button>${highlightSQL(sql)}</div>`;
}
function copyCode(btn) {
  const code = btn.parentElement.innerText.replace(/^Copy\n?/, "").trim();
  navigator.clipboard.writeText(code).then(() => { btn.textContent = "✓ Copied"; setTimeout(() => btn.textContent = "Copy", 1600); });
}
window.copyCode = copyCode;

/* Data table renderer */
function tableHtml(headers, rows, rowClasses=[]) {
  const th = headers.map(h => `<th>${esc(h)}</th>`).join("");
  const tr = rows.map((row, i) => {
    const cls = rowClasses[i] || "";
    return `<tr class="${cls}">${row.map(c => `<td>${c}</td>`).join("")}</tr>`;
  }).join("");
  return `<div class="dtWrap"><table class="dt"><thead><tr>${th}</tr></thead><tbody>${tr}</tbody></table></div>`;
}

/* ============================================================
   RENDER TAB NAV
   ============================================================ */
function renderTabs() {
  const html = STAGES.map((s, i) => {
    const locked = !state.moduleUnlocked[s.id];
    const active = state.stage === s.id;
    const done = state.moduleDone[s.id];
    let cls = "tab";
    if (active) cls += " active";
    if (locked && !done) cls += " locked";
    if (done) cls += " done";
    return `<button class="${cls}" data-id="${s.id}"><span class="num">${done ? "" : (i)}</span>${esc(s.short)}</button>`;
  }).join("");
  el("tabRow").innerHTML = html;
  el("tabRow").querySelectorAll(".tab").forEach(b => {
    b.addEventListener("click", () => {
      if (!state.moduleUnlocked[b.dataset.id]) {
        toast("Complete previous module first", "bad"); return;
      }
      goto(b.dataset.id);
    });
  });
  const doneCount = STAGES.filter(s => state.moduleDone[s.id]).length;
  el("progressBar").style.width = (doneCount / (STAGES.length - 1) * 100) + "%";
}

/* ============================================================
   NAV

function goto(next) {
  state.stage = next;
  renderTabs();
  if (next === "welcome") renderWelcome();
  else if (next.startsWith("m")) renderModule(next);
  else if (next.startsWith("q")) renderQuiz(next);
  else if (next === "challenge") renderChallenge();
  else if (next === "resources") renderResources();
  window.scrollTo({ top:0, behavior: window.matchMedia("(prefers-reduced-motion: reduce)").matches ? "auto" : "smooth" });
}

          <h5>Implicit default</h5>
          ${codeBlock(`SUM(revenue) OVER (
  ORDER BY order_date
)`)}
        </div>
      </div>
      <p>When you specify ORDER BY without a frame clause, the engine assumes <code>RANGE BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW</code>. Every row sees the sum from the beginning to itself.</p>

      <h3>7-day moving average</h3>
      ${codeBlock(`SELECT
  date,
  dau,
  AVG(dau) OVER (
    ORDER BY date
    ROWS BETWEEN 6 PRECEDING AND CURRENT ROW
  ) AS ma_7day
FROM daily_active_users;`)}
      <p>Each row's <code>ma_7day</code> is the average of the current row and the 6 rows before it. That's 7 rows total = a 7-day moving average.</p>

      <h3>Analogy: a spotlight scanning down a list</h3>
      <div class="diagram">
        ${svgFrame()}
      </div>
      <p>Imagine a spotlight moving down the rows. The frame clause controls how wide the spotlight is. UNBOUNDED PRECEDING = spotlight starts at row 1 and grows. 6 PRECEDING = spotlight is exactly 7 rows wide and slides.</p>

      <h3>ROWS vs. RANGE — the subtle difference</h3>
      <div class="callout">
        <h4>ROWS BETWEEN — counts physical rows</h4>
        <p>6 PRECEDING means "the 6 rows before this one" regardless of their values.</p>
      </div>
      <div class="callout">
        <h4>RANGE BETWEEN — includes rows with tied ORDER BY values</h4>
        <p>If two rows have the same date, ROWS treats them as separate; RANGE groups them into the same frame position.</p>
      </div>
      <p>90% of the time you want <code>ROWS BETWEEN</code>. Use RANGE only when you specifically want tied ORDER BY values grouped.</p>

      <h3>The LAST_VALUE gotcha (finally explained)</h3>
      <p>In Module 3 we mentioned LAST_VALUE has a gotcha. Here it is: the default frame is <code>RANGE UNBOUNDED PRECEDING AND CURRENT ROW</code>. So <code>LAST_VALUE(x)</code> returns the current row's value, not the last row's value.</p>
      <p>To get the actual last value in the partition, you must specify the frame explicitly:</p>
      ${codeBlock(`LAST_VALUE(amount) OVER (
  PARTITION BY customer_id
  ORDER BY order_date
  ROWS BETWEEN UNBOUNDED PRECEDING
       AND UNBOUNDED FOLLOWING
) AS actual_last_order_amount`)}

      <h3>Practical exercise</h3>
      <p><b>Task.</b> For each product, compute a 3-month rolling revenue (current month + 2 prior months).</p>
      <details style="margin:10px 0;">
        <summary style="cursor:pointer; color:var(--accent); font-weight:800; font-size:13px; letter-spacing:1.5px; text-transform:uppercase;">▸ Reveal solution</summary>
        <div style="margin-top:10px;">
          ${codeBlock(`SELECT
  product,
  month,
  revenue,
  SUM(revenue) OVER (
    PARTITION BY product
    ORDER BY month
    ROWS BETWEEN 2 PRECEDING AND CURRENT ROW
  ) AS rolling_3mo_revenue
FROM monthly_sales;`)}
          <p>The frame is 2 preceding + current = 3 rows total. PARTITION BY product ensures we don't accidentally sum across different products.</p>
        </div>
      </details>

      <h3>Common misconceptions</h3>
      <div class="callout warn">
        <h4>"I don't need to specify a frame — window functions default correctly."</h4>
        <p>Sometimes they do. LAST_VALUE and named window frames are the exception. If the default surprises you, specify the frame explicitly.</p>
      </div>
      <div class="callout warn">
        <h4>"ROWS BETWEEN 6 PRECEDING = a full 7-day window."</h4>
        <p>Only if you have 7 or more rows before the current one. Early rows see truncated windows — the first row's "7-day average" is just itself. Handle with a MIN row-count filter if needed.</p>
      </div>

      <div class="takeaways">
        <h4>KEY TAKEAWAYS</h4>
        <ul>
          <li><b>Frames</b> narrow a window to a specific range within the partition.</li>
          <li>SUM with ORDER BY defaults to a running total (UNBOUNDED PRECEDING → CURRENT ROW).</li>
          <li>Moving averages use <b>ROWS BETWEEN N PRECEDING AND CURRENT ROW</b>.</li>
          <li>ROWS counts rows literally; RANGE groups by tied ORDER BY values. Prefer ROWS.</li>
          <li>LAST_VALUE needs an explicit frame or it returns the current row.</li>
        </ul>
      </div>
    `,
    quiz:"q4"
  }
};

function renderQuiz(id) {
  const quiz = QUIZZES[id];
  const answers = state.quizAnswers[id] || {};
  const submitted = state.quizScores[id] !== undefined;

  const questionsHtml = quiz.questions.map((q, qi) => {
    const answer = answers[qi];
    const choices = q.options.map((opt, oi) => {
      let cls = "quizChoice";
      if (submitted) {
        if (oi === q.correct) cls += " correct";
        else if (answer === oi) cls += " wrong";
      } else if (answer === oi) {
        cls += " selected";
      }
      const letter = String.fromCharCode(65 + oi);
      return `
        <button class="${cls}" data-q="${qi}" data-o="${oi}" ${submitted ? "disabled" : ""}>
          <span class="letter">${letter}</span>
          <span>${esc(opt)}</span>
        </button>
      `;
    }).join("");

    const explainHtml = submitted ? `
      <div class="quizExplain ${answer === q.correct ? "correct" : "wrong"}">
        <b>${answer === q.correct ? "✓ Correct." : "✗ Not quite."}</b> ${esc(q.explain)}
      </div>
    ` : "";

    return `
      <div style="margin-bottom:22px;">
        <h3 style="font-size:16px; margin:14px 0 8px;">Q${qi + 1}. ${esc(q.q)}</h3>
        <div class="quizGrid">${choices}</div>
        ${explainHtml}
      </div>
    `;
  }).join("");

  const answered = Object.keys(answers).length;
  const total = quiz.questions.length;

  el("stage").innerHTML = `
    <div class="card">
      <span class="tag">Quiz · ${answered}/${total} answered</span>
      <h2 style="margin-top:14px;">${esc(quiz.title)}</h2>
      <p class="lead">Answer all four questions to unlock the next module. Every question has a full explanation on submit.</p>
      ${questionsHtml}
      <div class="actionBar" id="quizActions">
        <button class="btn leftActions" id="backBtn">← Back</button>
        ${submitted ? `
          <button class="btn" id="retryBtn">↻ Retry</button>
          <button class="btn primary" id="nextBtn">${quiz.nextModule === "challenge" ? "Continue to Final Challenge →" : "Continue to Next Module →"}</button>
        ` : `
          <button class="btn primary" id="submitBtn" ${answered < total ? "disabled" : ""}>Submit Quiz</button>
        `}
      </div>
      ${submitted ? `
        <div class="scoreCard">
          <div class="lbl">Your Score</div>
          <div class="val">${state.quizScores[id]}<span style="font-size:24px; color:var(--text-mute);">/${total}</span></div>
          <div class="msg">${scoreMessage(state.quizScores[id], total)}</div>
        </div>
      ` : ""}
    </div>
  `;

  document.querySelectorAll(".quizChoice").forEach(b => {
    b.addEventListener("click", () => {
      if (submitted) return;
      const qi = parseInt(b.dataset.q, 10);
      const oi = parseInt(b.dataset.o, 10);
      if (!state.quizAnswers[id]) state.quizAnswers[id] = {};
      state.quizAnswers[id][qi] = oi;
      renderQuiz(id);
    });
  });

  el("backBtn").addEventListener("click", () => goto(quiz.module));

  const submitBtn = el("submitBtn");
  if (submitBtn) submitBtn.addEventListener("click", () => {
    const answers = state.quizAnswers[id] || {};
    let score = 0;
    quiz.questions.forEach((q, qi) => { if (answers[qi] === q.correct) score++; });
    state.quizScores[id] = score;
    addXp(score * 10 + (score === total ? 50 : 0));
    state.moduleDone[id] = true;
    state.moduleUnlocked[quiz.nextModule] = true;
    state.badges = Object.keys(state.moduleDone).filter(k => k.startsWith("q") && state.moduleDone[k]).length;
    el("hudBadges").textContent = state.badges;
    if (score === total) burstConfetti();
    toast(`Quiz score: ${score}/${total}${score === total ? " · +50 XP bonus!" : ""}`, score >= 3 ? "good" : "bad");
    renderTabs();
    renderQuiz(id);
  });

  const retryBtn = el("retryBtn");
  if (retryBtn) retryBtn.addEventListener("click", () => {
    delete state.quizAnswers[id];
    delete state.quizScores[id];
    renderQuiz(id);
  });

  const nextBtn = el("nextBtn");
  if (nextBtn) nextBtn.addEventListener("click", () => {
    if (quiz.nextModule === "challenge") {
      state.moduleUnlocked.challenge = true;
      renderTabs();
    }
    goto(quiz.nextModule);
  });
}

function scoreMessage(score, total) {
  if (score === total) return "Perfect run — you've internalized the module. +50 XP bonus.";
  if (score >= 3) return "Strong grasp. Read the explanations on any misses before continuing.";
  if (score === 2) return "Partial — worth re-reading the module before the next quiz.";
  return "Try again after re-reading the module. The concepts stack.";
}

        <li>Their <b>cumulative spend</b> across all orders up to and including the second order</li>
      </ol>
      <p>Constraint: customers with fewer than 2 orders should be excluded.</p>

      <h3>Try it yourself first</h3>
      <p>Before revealing the solution — write out the pieces mentally:</p>
      <ul>
        <li>Which ranking function isolates the "second order"?</li>
        <li>Which value window gives the first order's date?</li>
        <li>Which frame produces cumulative spend?</li>

        <summary style="cursor:pointer; color:var(--accent); font-weight:800; font-size:14px; letter-spacing:1.5px; text-transform:uppercase;">▸ Reveal solution and step-by-step explanation</summary>
        <div style="margin-top:14px;">
          <h4>The full query</h4>
          ${codeBlock(`WITH enriched AS (
  SELECT
    customer_id,
    order_date,
    amount,
    ROW_NUMBER() OVER (
      PARTITION BY customer_id
      ORDER BY order_date
    ) AS order_num,
    FIRST_VALUE(order_date) OVER (
      PARTITION BY customer_id
      ORDER BY order_date
    ) AS first_order_date,
    SUM(amount) OVER (
      PARTITION BY customer_id
      ORDER BY order_date
      ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW
    ) AS cumulative_spend
  FROM orders
)
SELECT
  customer_id,
  order_date AS second_order_date,
  amount     AS second_order_amount,
  order_date - first_order_date AS days_since_first,
  cumulative_spend
FROM enriched
WHERE order_num = 2;`)}

          <h4>Step-by-step reasoning</h4>
          <ul>
            <li><b>ROW_NUMBER()</b> — assigns 1, 2, 3… to each customer's orders in date order. We filter to order_num = 2 to isolate the second order.</li>
            <li><b>FIRST_VALUE(order_date)</b> — captures each customer's earliest order date and carries it on every row. The second-order row can then subtract to get "days since first."</li>
            <li><b>SUM(amount) OVER (...ROWS BETWEEN UNBOUNDED PRECEDING AND CURRENT ROW)</b> — running total per customer. On the second-order row, this equals order 1 + order 2 = cumulative spend at that point.</li>
            <li><b>Excluding customers with fewer than 2 orders</b> — handled automatically. If a customer only has 1 order, no row exists with order_num = 2, so they're filtered out.</li>
          </ul>

            ["customer_id","second_order_date","second_order_amount","days_since_first","cumulative_spend"],

        <button class="btn leftActions" id="backBtn">← Back</button>
        <button class="btn primary" id="nextBtn">Continue to Cheat Sheet & Resources →</button>
      </div>

  `;

          <code>LEAD(x, 1) OVER (PARTITION BY id ORDER BY date)</code>
        </div>
        <div class="cheatCard">
          <h5>First value</h5>
          <code>FIRST_VALUE(x) OVER (PARTITION BY id ORDER BY date)</code>
        </div>
        <div class="cheatCard">
          <h5>Running total</h5>
          <code>SUM(x) OVER (ORDER BY date)</code>
        </div>
        <div class="cheatCard">
          <h5>7-day moving avg</h5>
          <code>AVG(x) OVER (ORDER BY date ROWS BETWEEN 6 PRECEDING AND CURRENT ROW)</code>
        </div>
        <div class="cheatCard">
          <h5>Top N per group</h5>
          <code>WITH r AS (SELECT *, ROW_NUMBER() OVER (PARTITION BY g ORDER BY x DESC) rn FROM t) SELECT * FROM r WHERE rn <= 3</code>
        </div>
      </div>

      <h3>Summary Notes</h3>
      <div class="callout">
        <h4>The four things to remember</h4>
        <p><b>1. Windows preserve rows.</b> GROUP BY collapses. Windows travel alongside.</p>
        <p><b>2. Ranking has three flavors.</b> ROW_NUMBER (unique), RANK (Olympic), DENSE_RANK (business).</p>
        <p><b>3. LAG/LEAD read from other rows.</b> First LAG is NULL. Last LEAD is NULL. Handle explicitly.</p>
        <p><b>4. Frames narrow the window.</b> Running totals use UNBOUNDED PRECEDING. Moving averages use N PRECEDING.</p>
      </div>

      <h3>Continue Learning</h3>

      <h4>Books</h4>
      <div class="resGrid">

        <div class="resTile"><h5>MySQL 8 Window Functions</h5><p>Newer to MySQL — if your team is on MySQL 5.x you can't use windows at all, know your version.</p></div>
        <div class="resTile"><h5>BigQuery Window Reference</h5><p>Cloud dialects support extended window syntax (NAMED WINDOWs, TIME RANGE frames). Worth knowing.</p></div>
      </div>

      <h4>Practice Platforms</h4>
      <div class="resGrid">

        <div class="resTile"><h5>SQLZoo</h5><p>Free, structured, beginner-friendly. Good for warming back up.</p></div>
      </div>

      <h4>Communities</h4>
      <div class="resGrid">

        <div class="resTile"><h5>Modern Data Stack Slack</h5><p>Where analytics engineers hang out. Higher-level SQL discussion (dbt, Snowflake, BigQuery).</p></div>
      </div>

      <h4>Research papers</h4>
      <div class="resGrid">
        <div class="resTile"><h5>SQL:2003 Window Functions</h5><p>The original spec. Dry but definitive on frame semantics.</p></div>
        <div class="resTile"><h5>"Efficient Processing of Window Functions in Analytical SQL Queries"</h5><p>How database engines actually implement window functions. Optional but interesting.</p></div>
      </div>

      <h4>Search keywords</h4>
      <div class="callout">
        <p>When stuck, search: <code>sql window function ORDER BY frame</code>, <code>row_number vs rank sql</code>, <code>lag lead sql running total</code>, <code>sql top N per group</code>, <code>last_value default frame</code>.</p>
      </div>

  `;
